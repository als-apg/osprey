<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Theme sync: set initial theme + listen for live changes from parent Web Terminal.
       This MUST be inline (not in a module) so it runs before CSS loads and has zero
       import dependencies that could prevent the listener from registering. -->
  <script>
    (function() {
      var p = new URLSearchParams(window.location.search);
      var t = p.get('theme') || localStorage.getItem('osprey-theme');
      if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'osprey-theme-change' && e.data.theme) {
          document.documentElement.setAttribute('data-theme', e.data.theme);
        }
      });
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSPREY Workspace</title>
  <meta name="description" content="Artifact Gallery for OSPREY Control System Agent">

  <!-- Fonts (self-hosted, no external CDN) -->
  <link rel="stylesheet" href="/static/fonts/fonts.css">

  <!-- highlight.js (syntax highlighting for code blocks) -->
  <link id="hljs-theme" rel="stylesheet" href="{{ vendor_url('highlight.js atom-one-dark theme', '/static/css/vendor/atom-one-dark.min.css') }}">
  <script src="{{ vendor_url('highlight.js', '/static/js/vendor/highlight.min.js') }}"></script>

  <!-- marked.js (markdown rendering) -->
  <script src="{{ vendor_url('marked', '/static/js/vendor/marked.min.js') }}"></script>

  <!-- KaTeX (math/equation rendering for markdown artifacts) -->
  <link rel="stylesheet" href="{{ vendor_url('KaTeX CSS', '/static/css/vendor/katex.min.css') }}">
  <script defer src="{{ vendor_url('KaTeX JS', '/static/js/vendor/katex.min.js') }}"></script>

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/static/css/gallery.css">

  <style>
    /* Inline critical styles */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="header-left">
          <a href="/" class="logo">
            <div class="logo-glyph">
              <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
              </svg>
            </div>
            <span class="logo-text">WORKSPACE</span>
          </a>
          <span class="header-artifact-count" id="header-count" title="Total artifacts">0</span>
        </div>
        <div class="header-right">
          <button class="btn btn-session-toggle" id="all-sessions-btn" title="Show artifacts from all sessions">
            All Sessions
          </button>
          <button class="btn btn-icon btn-header-refresh" id="refresh-btn" title="Refresh all data">
            <svg class="refresh-icon" width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
              <path d="M3.51 9a9 9 0 0114.85-3.36L23 10"/>
              <path d="M20.49 15a9 9 0 01-14.85 3.36L1 14"/>
            </svg>
          </button>
          <span class="status-indicator" id="health-indicator">
            <span class="status-dot healthy"></span>
            <span class="status-label">Connected</span>
          </span>
        </div>
      </div>
    </header>

    <!-- Filter Bar -->
    <nav class="filter-bar" id="filter-bar">
      <div class="filter-bar-inner">
        <button class="filter-chip active" data-filter="all">ALL</button>
        <button class="filter-chip" data-filter="pinned" title="Pinned items" hidden>
          <svg class="filter-chip-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 4.5L7.5 12 4 8.5"/>
            <line x1="12" y1="17" x2="12" y2="22"/>
            <path d="M9 11l-4 4"/>
            <path d="M5 19l4-4"/>
            <path d="M14.5 4l5 5-4.5 4.5-5-5z"/>
          </svg>
          Pinned <span class="chip-count"></span>
        </button>
        <!-- Type chips populated dynamically by JS from the type registry -->
        <span class="filter-chip-separator" id="filter-type-chips"></span>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main">
      <!-- Browse View — Split Pane: sidebar (tree/timeline) + preview -->
      <section id="view-artifacts-browse" class="view active">
        <div class="browse-layout">
          <!-- Left sidebar — file tree / activity timeline -->
          <aside class="browse-sidebar" id="browse-sidebar">
            <div class="sidebar-header">
              <div class="sidebar-controls-row">
                <div class="sidebar-mode-toggle">
                  <button class="mode-btn active" data-mode="tree" title="Group by type">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
                    </svg>
                    Types
                  </button>
                  <button class="mode-btn" data-mode="activity" title="Sort chronologically">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="12" cy="12" r="10"/>
                      <path d="M12 6v6l4 2"/>
                    </svg>
                    Activity
                  </button>
                </div>
                <div class="sidebar-layout-toggle" id="layout-toggle">
                  <button class="layout-btn active" data-layout="list" title="List view">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>
                    </svg>
                  </button>
                  <button class="layout-btn" data-layout="gallery" title="Gallery view">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <rect x="3" y="3" width="7" height="7" rx="1"/>
                      <rect x="14" y="3" width="7" height="7" rx="1"/>
                      <rect x="3" y="14" width="7" height="7" rx="1"/>
                      <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                  </button>
                </div>
              </div>
              <div class="sidebar-search">
                <svg class="sidebar-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="11" cy="11" r="7"/>
                  <path d="M21 21l-4.35-4.35"/>
                </svg>
                <input
                  type="text"
                  id="search"
                  class="sidebar-search-input"
                  placeholder="Filter..."
                  autocomplete="off"
                >
              </div>
            </div>
            <div class="sidebar-body" id="sidebar-body">
              <!-- Tree or timeline rendered here -->
            </div>
          </aside>

          <!-- Drag handle for resizing -->
          <div class="resize-handle" id="resize-handle">
            <div class="resize-handle-grip"></div>
          </div>

          <!-- Right pane — inline preview -->
          <div class="browse-preview-pane" id="browse-preview-pane">
            <div class="preview-empty" id="preview-empty">
              <div class="preview-empty-inner">
                <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1">
                  <rect x="6" y="6" width="36" height="36" rx="4" stroke-dasharray="4 4"/>
                  <path d="M6 32l12-12 8 8 6-6 10 10"/>
                  <circle cx="16" cy="16" r="3"/>
                </svg>
                <p>Select an artifact to preview</p>
              </div>
            </div>
            <div class="preview-content hidden" id="preview-content">
              <!-- Preview rendered dynamically -->
            </div>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script src="/static/js/gallery.js"></script>
  <script src="/static/js/logbook.js"></script>
  <script src="/static/js/print.js"></script>
</body>
</html>
