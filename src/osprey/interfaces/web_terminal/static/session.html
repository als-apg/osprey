<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSPREY — Activity</title>

  <!-- Per-user URL prefix contract (multi-user deployments): the JS source
       of truth, and the import map retargeting root-absolute /design-system/
       and /static/ ES-module specifiers under it. Must land before any
       module script loads. Empty prefix (single-origin/dev) is a no-op
       identity map. See app.py's compute_url_prefix(). -->
  <script>window.__OSPREY_PREFIX__ = "{{ url_prefix }}";</script>
  <script type="importmap">
  {
    "imports": {
      "/design-system/": "{{ url_prefix }}/design-system/",
      "/static/": "{{ url_prefix }}/static/"
    }
  }
  </script>

  <script src="{{ prefixed('/design-system/js/theme-boot.js') }}"></script>
  <link rel="stylesheet" href="{{ prefixed('/design-system/css/tokens.css') }}">
  <link rel="stylesheet" href="{{ prefixed('/design-system/css/base.css') }}">
  <link rel="stylesheet" href="{{ prefixed('/design-system/css/highlight.css') }}">
  <link rel="stylesheet" href="{{ prefixed('/static/fonts/apex-fonts.css') }}">
  <link rel="stylesheet" href="{{ prefixed('/static/css/session.css') }}">
  <link rel="stylesheet" href="{{ prefixed('/static/css/activity-strip.css') }}">
</head>
<body>

<header>
  <h1>Activity</h1>
  <osprey-theme-switcher></osprey-theme-switcher>
  <div class="refresh-dot" id="refresh-dot"></div>
</header>

<nav id="nav">
  <button class="pill active" data-view="agents">Agents</button>
  <button class="pill" data-view="toollog">Tool Log</button>
  <button class="pill" data-view="artifacts">Artifacts</button>
  <button class="pill" data-view="conversation">Conversation</button>
</nav>

<main>
  <section class="view active" id="view-agents"></section>
  <section class="view" id="view-toollog"></section>
  <section class="view" id="view-artifacts"></section>
  <section class="view" id="view-conversation"></section>
</main>

<div class="toast" id="toast"></div>

<!-- Agent activity strip (floating variant — this page has no status bar):
     hidden while empty, fixed overlay so it never shifts the layout. -->
<div class="status-activity status-activity-floating" id="activity-strip" role="status" aria-live="polite"></div>

<script type="module" src="{{ prefixed('/static/js/session.js') }}"></script>

<!-- Activity strip: self-registering module; binds #activity-strip above to
     panel-manager's activity seam (inert until a panel-manager runs here). -->
<script type="module" src="{{ prefixed('/static/js/activity-strip.js') }}"></script>

</body>
</html>
