# =============================================================================
# docker-compose.yml — ${config.facility.name}
# =============================================================================
#
# GENERATED by the osprey-build-deploy skill from facility-config.yml.
# Regenerated whenever the interview changes anything that affects services,
# ports, or module selection.
#
# DO NOT EDIT THIS FILE DIRECTLY.
#
# For facility-specific additions (a one-off debugging service, an override for
# your network), create docker-compose.local.yml (gitignored) and list it in
# runtime.compose_files after the base file. It will merge on top.
#
# Ports are bound to 0.0.0.0 by default (externally reachable on the deploy
# server). Change to 127.0.0.1 in a local overlay if a service should stay
# host-local.
# =============================================================================

services:

  # IF MODULE ariel.enabled
  # IF modules.ariel.deployment == container
  # ---------------------------------------------------------------------------
  # ARIEL Postgres — in-compose deployment. Uses the pgvector image because
  # ARIEL stores embeddings alongside relational data. Named volume keeps the
  # data off NFS (rootless podman + NFS = pain — see references/deploy-server.md).
  #
  # Service key `ariel-postgres` IS the Docker DNS hostname; the default DSN
  # `postgresql://ariel:ariel@ariel-postgres:5432/ariel` resolves against it.
  # ---------------------------------------------------------------------------
  ariel-postgres:
    image: pgvector/pgvector:pg16
    container_name: ${config.facility.prefix}-ariel-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ariel
      POSTGRES_USER: ariel
      POSTGRES_PASSWORD: ariel
      TZ: ${config.facility.timezone}
    volumes:
      - ariel_postgres_data:/var/lib/postgresql/data
    networks:
      - ${config.facility.prefix}-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ariel -d ariel"]
      interval: 10s
      timeout: 5s
      retries: 5

  ariel-sync:
    # ARIEL sync runs inside the web-terminal image because it has OSPREY
    # installed. One-shot container that exits after sync — restart policy
    # is intentionally "on-failure" so it doesn't loop forever.
    image: ${config.registry.url}/web-terminal:latest
    container_name: ${config.facility.prefix}-ariel-sync
    command: osprey ariel sync
    env_file: .env.production
    networks:
      - ${config.facility.prefix}-net
    depends_on:
      ariel-postgres: { condition: service_healthy }
    restart: on-failure:3
  # END IF
  # END IF

  # IF MODULE custom_mcp_servers.enabled
  # FOR each in modules.custom_mcp_servers.servers where "typesense" in each.depends_on
  # ---------------------------------------------------------------------------
  # Typesense — shared search engine for MCP servers that need fast keyword +
  # vector search (e.g., accelpapers). Generated here (once, not per-server)
  # because any server listing "typesense" in depends_on shares this instance.
  # ---------------------------------------------------------------------------
  typesense:
    image: typesense/typesense:27.1
    container_name: ${config.facility.prefix}-typesense
    restart: unless-stopped
    ports:
      - "0.0.0.0:8108:8108"
    command: --data-dir /data --api-key=${env.TYPESENSE_API_KEY:-dev}
    volumes:
      - typesense_data:/data
    networks:
      - ${config.facility.prefix}-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8108'"]
      interval: 10s
      timeout: 5s
      retries: 5
  # END FOR (emit this block only once even if multiple servers depend on typesense)
  # END IF

  # ---------------------------------------------------------------------------
  # Anchor for custom MCP server common settings. Every MCP server container
  # inherits: image from this facility's registry, env_file, restart, network,
  # the standard MCP_TRANSPORT=http pattern.
  # ---------------------------------------------------------------------------
  # (Anchor declared on the first custom MCP server via &mcp-base)

  # IF MODULE custom_mcp_servers.enabled
  # FOR each in modules.custom_mcp_servers.servers
  # ---------------------------------------------------------------------------
  # Custom MCP server: ${each.name}
  #
  # Service key uses the full ${prefix}-mcp-${name} form so custom names can
  # never collide with reserved shared services (`typesense`, `ariel-postgres`,
  # `event-dispatcher`, `integration-tests`, `dispatch-sidecar-N`). The
  # scaffolder resolves bare names in `depends_on` and in
  # `modules.shared_disk.services_to_mount` to the fully-qualified service key.
  # ---------------------------------------------------------------------------
  ${config.facility.prefix}-mcp-${each.name}:
    # FIRST_ITERATION: &mcp-base
    image: ${config.registry.url}/mcp-${each.name}:latest
    container_name: ${config.facility.prefix}-mcp-${each.name}
    restart: unless-stopped
    environment:
      - MCP_TRANSPORT=http
      - MCP_PORT=${each.port}
    env_file: .env.production
    ports:
      - "0.0.0.0:${each.port}:${each.port}"
    networks:
      - ${config.facility.prefix}-net
    # IF each.depends_on (non-empty)
    depends_on:
      # FOR dep in each.depends_on (scaffolder resolves bare names to full service keys)
      # IF dep has healthcheck (typesense, ariel-postgres)
      ${dep}: { condition: service_healthy }
      # ELSE
      - ${dep}
      # END IF
      # END FOR
    # END IF
  # END FOR
  # END IF

  # ---------------------------------------------------------------------------
  # Integration tests MCP server — always present. Exposes /health (fast
  # liveness) and /checks (the full health report consumed by verify.sh).
  # Mounts the shared disk read-only if that module is enabled, because many
  # checks verify file presence on the shared NFS path.
  # ---------------------------------------------------------------------------
  integration-tests:
    image: ${config.registry.url}/mcp-integration-tests:latest
    container_name: ${config.facility.prefix}-mcp-integration-tests
    restart: unless-stopped
    environment:
      - MCP_TRANSPORT=http
      - MCP_PORT=${config.ports.integration_tests}
    env_file: .env.production
    ports:
      - "0.0.0.0:${config.ports.integration_tests}:${config.ports.integration_tests}"
    networks:
      - ${config.facility.prefix}-net
    # IF MODULE shared_disk.enabled AND "integration_tests" in modules.shared_disk.services_to_mount
    volumes:
      - ${config.modules.shared_disk.host_path}:${config.modules.shared_disk.container_path}:${config.modules.shared_disk.mount_mode}
    # END IF

  # IF MODULE event_dispatcher.enabled
  # ---------------------------------------------------------------------------
  # Event dispatcher — receives webhooks and (if epics_ca.enabled) monitors
  # EPICS Channel Access for PV transitions. Runs on host networking when CA
  # is enabled, because CA discovery broadcasts don't cross container bridges
  # reliably. When host-networked, every client (sidecars, web terminals)
  # reaches it via `host.containers.internal:${port}` rather than the compose
  # DNS name. See references/modules/event-dispatcher.md.
  # ---------------------------------------------------------------------------
  event-dispatcher:
    image: ${config.registry.url}/mcp-event-dispatcher:latest
    container_name: ${config.facility.prefix}-event-dispatcher
    restart: unless-stopped
    # IF modules.event_dispatcher.epics_ca.enabled
    network_mode: host
    # ELSE
    networks:
      - ${config.facility.prefix}-net
    ports:
      - "0.0.0.0:${config.modules.event_dispatcher.port}:${config.modules.event_dispatcher.port}"
    # END IF
    environment:
      - MCP_TRANSPORT=http
      - MCP_PORT=${config.modules.event_dispatcher.port}
      - ${config.modules.event_dispatcher.token_env_var}=${env.${config.modules.event_dispatcher.token_env_var}}
      - ${config.modules.event_dispatcher.sidecar_token_env_var}=${env.${config.modules.event_dispatcher.sidecar_token_env_var}}
    env_file: .env.production
    volumes:
      - ./${config.modules.event_dispatcher.triggers_file}:/app/${config.modules.event_dispatcher.triggers_file}:ro

  # FOR i in 0..${config.modules.event_dispatcher.sidecar_count - 1}
  # ---------------------------------------------------------------------------
  # Dispatch sidecar ${i} — wraps claude_agent_sdk.query() for one concurrent
  # run. The dispatcher routes work to sidecars over HTTP on
  # sidecar_port_base + ${i}. Every sidecar is otherwise identical.
  #
  # When the dispatcher is on host networking (epics_ca.enabled), sidecars
  # also run on host networking so they can exchange traffic over localhost
  # without traversing the bridge (rootless podman treats host<->bridge
  # as a NAT boundary, and the dispatcher's host-bound port is not on the
  # bridge at all).
  # ---------------------------------------------------------------------------
  dispatch-sidecar-${i}:
    image: ${config.registry.url}/dispatch-sidecar:latest
    container_name: ${config.facility.prefix}-dispatch-sidecar-${i}
    restart: unless-stopped
    # IF modules.event_dispatcher.epics_ca.enabled
    network_mode: host
    # ELSE
    networks:
      - ${config.facility.prefix}-net
    ports:
      - "0.0.0.0:${config.modules.event_dispatcher.sidecar_port_base + i}:9100"
    # END IF
    env_file: .env.production
    environment:
      # On host networking the sidecar binds the host-visible port directly;
      # on bridge networking it binds :9100 inside the container and compose
      # publishes it as sidecar_port_base+i on the host.
      # IF modules.event_dispatcher.epics_ca.enabled
      - SIDECAR_PORT=${config.modules.event_dispatcher.sidecar_port_base + i}
      # ELSE
      - SIDECAR_PORT=9100
      # END IF
      - ${config.modules.event_dispatcher.sidecar_token_env_var}=${env.${config.modules.event_dispatcher.sidecar_token_env_var}}
      - ${config.llm.api_key_env_var}=${env.${config.llm.api_key_env_var}}
  # END FOR
  # END IF

  # IF registry.external_projects
  # FOR each in registry.external_projects
  # ---------------------------------------------------------------------------
  # External project image: ${each.name}
  # Pulled explicitly in scripts/deploy.sh using its dedicated deploy token
  # because the main registry login doesn't have access to sibling projects.
  # ---------------------------------------------------------------------------
  ${each.name}:
    image: ${each.url}/${each.image}
    container_name: ${config.facility.prefix}-${each.name}
    restart: unless-stopped
    networks:
      - ${config.facility.prefix}-net
    # IF each.port
    ports:
      - "0.0.0.0:${each.port}:${each.port}"
    # END IF
  # END FOR
  # END IF

volumes:
  # IF MODULE ariel.enabled AND modules.ariel.deployment == container
  ariel_postgres_data:
  # END IF
  # IF MODULE custom_mcp_servers.enabled AND any uses typesense
  typesense_data:
  # END IF

networks:
  ${config.facility.prefix}-net:
