# =============================================================================
# .gitlab-ci.yml — ${config.facility.name}
# =============================================================================
#
# GENERATED by the osprey-build-deploy skill from facility-config.yml.
# DO NOT EDIT DIRECTLY — structural changes go through the template at
# templates/core/.gitlab-ci.yml in the skill repo.
#
# Five-stage pipeline:
#   build-ci-image → osprey-build → checks → docker-build → release
#
# The release stage is manual and restricted to ${config.gitlab.default_branch}.
# It re-tags every SHA-tagged image as :latest. Until that job runs, the
# deploy server continues to pull the previous :latest.
#
# Required CI/CD variables (Settings → CI/CD → Variables, masked, protected):
#   ${config.gitlab.token_env_var}    — api + read_registry + write_registry scopes
#   ${config.llm.api_key_env_var}     — LLM provider key
#   (plus module-specific tokens — see references/gitlab-ci-pipeline.md)
# =============================================================================

stages:
  - build-ci-image
  - osprey-build
  - checks
  - docker-build
  - release

variables:
  REGISTRY: $CI_REGISTRY_IMAGE
  # IF network.http_proxy
  HTTP_PROXY: "${config.network.http_proxy}"
  HTTPS_PROXY: "${config.network.https_proxy}"
  http_proxy: "${config.network.http_proxy}"
  https_proxy: "${config.network.https_proxy}"
  NO_PROXY: "${config.network.no_proxy | join(',')}"
  no_proxy: "${config.network.no_proxy | join(',')}"
  # END IF

# ---------------------------------------------------------------------------
# Stage 1: CI base image (OSPREY + all Python deps baked in).
#
# Triggered on pyproject.toml / Dockerfile.ci / .gitlab-ci.yml changes, or
# manually via the GitLab UI. Cached otherwise — base image rebuilds are
# ~2min and every downstream job depends on this image.
#
# --no-cache is mandatory. pip layers cache aggressively and silently reuse
# stale OSPREY commits when the upstream mirror advances.
# ---------------------------------------------------------------------------
build-ci-image:
  stage: build-ci-image
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build --no-cache -f docker/Dockerfile.ci
        --build-arg OSPREY_INSTALL_TOKEN=$CI_DEPLOY_TOKEN
        -t $REGISTRY/ci-base:latest .
    - docker push $REGISTRY/ci-base:latest
  allow_failure: true
  rules:
    - changes: [pyproject.toml, docker/Dockerfile.ci, .gitlab-ci.yml]
    - when: manual

# ---------------------------------------------------------------------------
# Stage 2: OSPREY build — runs inside ci-base:latest. Produces every
# artifact the downstream docker-build jobs COPY into their images.
#
# Artifacts land under artifacts/ and are uploaded as CI artifacts so later
# stages can pull them via `dependencies:`.
# ---------------------------------------------------------------------------
osprey-build:
  stage: osprey-build
  image: $REGISTRY/ci-base:latest
  script:
    # Assemble .env.production from masked CI variables. Every required var
    # listed in the prod profile YAML must be present as a CI variable.
    - |
      cat > .env.production << ENVEOF
      ${config.llm.api_key_env_var}=${env.${config.llm.api_key_env_var}}
      ${config.gitlab.token_env_var}=${env.${config.gitlab.token_env_var}}
      # IF MODULE olog.enabled
      ${config.modules.olog.username_env_var}=${env.${config.modules.olog.username_env_var}}
      ${config.modules.olog.password_env_var}=${env.${config.modules.olog.password_env_var}}
      # END IF
      # IF MODULE wiki_search.enabled
      ${config.modules.wiki_search.token_env_var}=${env.${config.modules.wiki_search.token_env_var}}
      # END IF
      # IF MODULE event_dispatcher.enabled
      ${config.modules.event_dispatcher.token_env_var}=${env.${config.modules.event_dispatcher.token_env_var}}
      ${config.modules.event_dispatcher.sidecar_token_env_var}=${env.${config.modules.event_dispatcher.sidecar_token_env_var}}
      # END IF
      # IF MODULE ariel.enabled
      ARIEL_DSN=${config.modules.ariel.dsn}
      # END IF
      TZ=${config.facility.timezone}
      ENVEOF

    - export PYTHONPATH=mcp_servers

    # Render the prod profile. --skip-lifecycle because CI has no container
    # runtime for post-build hooks; --skip-deps because the base image already
    # pip-installed everything; --runtime-root is the path the project will
    # occupy inside the web-terminal container (NOT on the CI runner).
    - >
      osprey build ${config.facility.prefix}-assistant ${config.facility.prefix}-prod.yml
      -o build-output --skip-lifecycle --skip-deps
      --runtime-root /app/${config.facility.prefix}-assistant

    - mkdir -p artifacts

    # FOR each in modules.custom_mcp_servers.servers where each.artifacts
    # Build-time data for custom MCP server: ${each.name}
    # FOR artifact in each.artifacts
    # (Insert the commands that produce ${artifact} here — see the custom
    #  MCP server's own build notes. Output path must match exactly.)
    # END FOR
    # END FOR

    # Copy rendered project + config to artifacts for downstream jobs.
    - cp build-output/${config.facility.prefix}-assistant/config.yml artifacts/config.yml
    - cp -r build-output/${config.facility.prefix}-assistant artifacts/${config.facility.prefix}-assistant
    - cp .env.production artifacts/.env.production

  artifacts:
    paths:
      - artifacts/
    expire_in: 30 days

# ---------------------------------------------------------------------------
# Stage 3: Checks (lint + offline tests). Allow-failure so a formatting
# regression doesn't block the whole pipeline, but surface the failure.
# ---------------------------------------------------------------------------
lint:
  stage: checks
  image: $REGISTRY/ci-base:latest
  script:
    - pip install ruff
    - ruff check mcp_servers/ tests/
  allow_failure: true

test:
  stage: checks
  image: $REGISTRY/ci-base:latest
  needs: [osprey-build]
  script:
    - export OSPREY_CONFIG=artifacts/config.yml
    - export PYTHONPATH=mcp_servers
    # Exclude every marker that needs running services. Those are covered
    # post-deploy via scripts/verify.sh and the integration-tests MCP server.
    - >
      pytest tests/integration/ -v --tb=short
      -m 'not live_service and not ${config.control_system.type}_write'
  allow_failure: true

# ---------------------------------------------------------------------------
# Stage 4: Docker image builds (parallel). One job per buildable image.
#
# Template anchor for the common docker login / dind setup. Every concrete
# build-* job uses <<: *docker-build-template and adds its own script:.
# ---------------------------------------------------------------------------
.docker-build-template: &docker-build-template
  stage: docker-build
  image: docker:24
  services:
    - docker:24-dind
  needs: [osprey-build]
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

# IF MODULE custom_mcp_servers.enabled
# FOR each in modules.custom_mcp_servers.servers
build-${each.name}:
  <<: *docker-build-template
  script:
    - >
      docker build
      # FOR arg in each.build_args
      --build-arg ${arg}=${env.${arg}}
      # END FOR
      -f ${each.dockerfile}
      -t $REGISTRY/mcp-${each.name}:$CI_COMMIT_SHORT_SHA
      ${each.build_context}
    - docker push $REGISTRY/mcp-${each.name}:$CI_COMMIT_SHORT_SHA
# END FOR
# END IF

# Always-built: integration-tests image (the /checks endpoint that verify.sh
# hits post-deploy lives here).
build-integration-tests:
  <<: *docker-build-template
  script:
    - docker build -f docker/Dockerfile.integration-tests
        -t $REGISTRY/mcp-integration-tests:$CI_COMMIT_SHORT_SHA .
    - docker push $REGISTRY/mcp-integration-tests:$CI_COMMIT_SHORT_SHA

# IF MODULE event_dispatcher.enabled
build-event-dispatcher:
  <<: *docker-build-template
  script:
    - docker build -f docker/Dockerfile.event-dispatcher
        -t $REGISTRY/mcp-event-dispatcher:$CI_COMMIT_SHORT_SHA .
    - docker push $REGISTRY/mcp-event-dispatcher:$CI_COMMIT_SHORT_SHA

# Separate image for the sidecars: they run an SDK-wrapping agent runtime,
# not the MCP server code, and we don't want every dispatcher rebuild to
# force-invalidate N sidecar containers.
build-dispatch-sidecar:
  <<: *docker-build-template
  script:
    - docker build -f docker/Dockerfile.dispatch-sidecar
        -t $REGISTRY/dispatch-sidecar:$CI_COMMIT_SHORT_SHA .
    - docker push $REGISTRY/dispatch-sidecar:$CI_COMMIT_SHORT_SHA
# END IF

# IF MODULE web_terminals.enabled
# ---------------------------------------------------------------------------
# Web terminal image — COPYs the rendered Claude Code project + .env.production
# from artifacts/. OSPREY_CACHE_BUST ensures the COPY layer invalidates when
# osprey-build emits new artifacts (otherwise cached "Using cached" reuses
# the stale layer even though the artifact changed).
# ---------------------------------------------------------------------------
build-web-terminal:
  <<: *docker-build-template
  script:
    - docker system prune -af --filter "until=24h" || true
    - >
      docker build
      --build-arg OSPREY_INSTALL_TOKEN=$CI_DEPLOY_TOKEN
      --build-arg OSPREY_CACHE_BUST=$CI_PIPELINE_ID
      -f docker/Dockerfile.web-terminal
      -t $REGISTRY/web-terminal:$CI_COMMIT_SHORT_SHA .
    - docker push $REGISTRY/web-terminal:$CI_COMMIT_SHORT_SHA
# END IF

# ---------------------------------------------------------------------------
# Stage 5: Release — manual, default-branch only. Re-tags every SHA image
# as :latest so the deploy server's `compose pull` picks it up.
#
# This is the ONLY gate between CI passing and a production deploy. Do not
# remove `when: manual`.
# ---------------------------------------------------------------------------
release:
  stage: release
  image: docker:24
  services:
    - docker:24-dind
  needs:
    # IF MODULE custom_mcp_servers.enabled
    # FOR each in modules.custom_mcp_servers.servers
    - build-${each.name}
    # END FOR
    # END IF
    - build-integration-tests
    # IF MODULE event_dispatcher.enabled
    - build-event-dispatcher
    - build-dispatch-sidecar
    # END IF
    # IF MODULE web_terminals.enabled
    - build-web-terminal
    # END IF
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      IMAGES="mcp-integration-tests"
      # IF MODULE custom_mcp_servers.enabled
      # FOR each in modules.custom_mcp_servers.servers
      IMAGES="$IMAGES mcp-${each.name}"
      # END FOR
      # END IF
      # IF MODULE event_dispatcher.enabled
      IMAGES="$IMAGES mcp-event-dispatcher dispatch-sidecar"
      # END IF
      # IF MODULE web_terminals.enabled
      IMAGES="$IMAGES web-terminal"
      # END IF
      for img in $IMAGES; do
        docker pull $REGISTRY/$img:$CI_COMMIT_SHORT_SHA
        docker tag  $REGISTRY/$img:$CI_COMMIT_SHORT_SHA $REGISTRY/$img:latest
        docker push $REGISTRY/$img:latest
      done
  rules:
    - if: $CI_COMMIT_BRANCH == "${config.gitlab.default_branch}"
      when: manual
