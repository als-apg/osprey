# control-assistant.yml
# Full control system deployment — the standard starting point for facilities
# operating a particle accelerator or beamline with EPICS or a mock backend.
#
# Copy this file to your own profile directory, rename it, and adjust the
# config overrides, overlay paths, and MCP server definitions for your site.

name: Control Assistant

# The data bundle provides the project skeleton (config.yml, registry, data
# files, benchmark datasets, etc.).  "control_assistant" is the standard full
# bundle that includes channel databases, benchmarks, and a logbook seed.
data_bundle: control_assistant

# Default LLM provider and model.  Override here or via --provider / --model
# flags on `osprey build`.
provider: anthropic
model: claude-haiku-4-5

# Channel-finder pipeline. Override via --set channel_finder_mode=in_context|middle_layer.
channel_finder_mode: hierarchical

# ── Artifact selection ───────────────────────────────────────────────────────
# Each list entry is a short name resolved from the osprey artifact library.
# Remove entries you do not need; add facility-specific artifacts via overlay.

hooks:
  - hook-log          # Append every tool call to a structured JSONL audit log
  - hook-config       # Inject project config.yml path into every tool call env
  - approval          # Gate hardware-write tool calls on human approval prompt
  - writes-check      # Pre-write safety check: confirm channel is writable
  - limits            # Enforce per-channel min/max limits before writes
  - error-guidance    # Post-error hook that surfaces remediation hints
  - memory-guard      # Warn when context window approaches threshold
  - notebook-update   # Sync CLAUDE.md notebook after each session
  - cf-feedback-capture  # Capture channel-finder accuracy feedback for tuning
  - config-drift      # Warn at session start when config.yml drifted from generated artifacts

rules:
  - safety              # Core safety rules: never write without approval
  - error-handling      # Standard error handling and retry guidance
  - artifacts           # Rules for saving diagnostic and tuning artifacts
  - facility            # Facility-level conventions (naming, units, logbook)
  - workflows           # Approved workflow patterns (scan, ramp, restore)
  - timezone            # Always localise timestamps to facility timezone
  - python-execution    # Rules governing Python executor sandbox usage
  - data-visualization  # Rules for producing control-room-ready plots
  - control-system-safety  # EPICS PV safety: alarm limits, soft-IOC guards

skills:
  - diagnose        # Run a structured fault-diagnosis workflow
  - setup-mode      # Toggle between interactive and automated operating modes
  - session-report  # Summarise session actions and outcomes to the logbook
  - demo-gallery    # Launch guided capability demonstrations
  - writing-bluesky-plans  # Author, validate, and launch a session-tier scan plan (requires the scan MCP server)

agents:
  - channel-finder          # Semantic search over channel databases (hierarchical)
  - data-visualizer         # Produce strip charts and correlation plots
  - logbook-search          # Search facility logbook for historical entries
  - logbook-deep-research   # Multi-hop logbook research with synthesis
  - facility-knowledge      # Look up facility documentation, procedures, and device specs

output_styles:
  - control-operator  # Terse, actionable output style for control-room operators

web_panels:
  - ariel           # ARIEL search interface (past experiments, papers)
  - channel-finder  # Interactive channel-finder web UI
  - events          # EVENTS dashboard tab (event dispatcher)
  - scan-plan       # Bluesky scan plan selection & execute
  - scan-results    # Live scan results viewer
  - scan-health     # Scan-stack health dashboard

# ── Scan stack (turn-key, VA-backed) ─────────────────────────────────────────
# The tutorial ships the FULL Bluesky-mediated scan stack out of the box:
# a Bluesky scan-bridge (+ co-deployed Tiled catalog), a PyAT Virtual
# Accelerator soft-IOC standing in for real EPICS hardware, and the
# scan-panels sidecar that serves the three web_panels above. Each top-level
# block below is an injector trigger (`_inject_bluesky`/`_inject_va`/
# `_inject_scan_panels` in build_cmd.py) — it renders the corresponding
# `services.<name>` compose service, appends to `deployed_services`, and (for
# scan_panels) registers the `web.panels.<id>` URLs. Remove this section
# (and the three scan-panel ids above) to ship a scan-free tutorial.
bluesky:
  port: 8090
  tiled_enabled: true      # co-deploys the Tiled catalog sidecar alongside the bridge
  tiled_port: 8091
  # demo_scanner intentionally omitted: the tutorial drives the bridge against
  # the real VA soft-IOC over BLUESKY_EPICS_SUBSTRATE, not the mock demo scanner.

virtual_accelerator:
  # MUST stay 5064 — config.yml.j2 hardcodes the VA gateway port at 5064
  # (control_system.connector.virtual_accelerator.gateways.*.port is not
  # templated from services.virtual_accelerator.port); changing this here
  # would desync the connector from the deployed container.
  port: 5064

scan_panels:
  port: 8095

# ── Config overrides ─────────────────────────────────────────────────────────
# These key.path entries are written into config.yml after the template renders.
# Uncomment and set values appropriate for your facility.
config:
  # The VA soft-IOC ships and is deployed as part of the turn-key scan stack
  # above, but control_system.type defaults to "mock" so a fresh tutorial
  # project stays safe out of the box: the panels, plan catalog, and health
  # dashboard all work, and no live/simulated hardware is touched. Note the
  # mock connector does NOT track setpoints (its readbacks are a non-tracking
  # simulation), so a settle-verified scan will not COMPLETE on mock — mock is
  # for browsing/UI. Flip this one line to "virtual_accelerator" to drive the
  # deployed VA end-to-end (correctors move, BPMs read); use "epics" for live
  # hardware.
  control_system.type: mock
  # Required for arming: a local-exec posture withholds the auto-minted
  # BLUESKY_PROMOTE_TOKEN (see container_lifecycle.py's
  # _local_exec_arming_unsafe) — container execution is what lets `osprey
  # deploy up` mint the token safely.
  execution.execution_method: container
  # The scan MCP server is off-by-default in the framework registry
  # (default_enabled=False); opt in here so the tutorial's agent can author
  # and launch scan plans out of the box.
  claude_code.servers.scan.enabled: true
  # system.timezone: America/Los_Angeles
  # system.facility_name: My Facility
  # EVENTS panel — surfaces the event-dispatcher dashboard as an in-terminal tab.
  # URL defaults to the host-run dispatcher (127.0.0.1:8020); override
  # EVENT_DISPATCHER_URL for containerized/remote web terminals.
  web.panels.events.label: EVENTS
  web.panels.events.url: "${EVENT_DISPATCHER_URL:-http://localhost:8020}"
  web.panels.events.path: /dashboard
  web.panels.events.health_endpoint: /health
  # SCAN panels — the operator UI for the mediated scan stack (plan selection &
  # execute, live results, service health), served by the scan-panels sidecar.
  # URL defaults to the host-published sidecar port; override SCAN_PANELS_URL for
  # a containerized/remote web terminal (same pattern as the EVENTS panel above).
  web.panels.scan-plan.label: SCAN PLAN
  web.panels.scan-plan.url: "${SCAN_PANELS_URL:-http://localhost:8095}"
  web.panels.scan-plan.path: /plan/
  web.panels.scan-results.label: SCAN RESULTS
  web.panels.scan-results.url: "${SCAN_PANELS_URL:-http://localhost:8095}"
  web.panels.scan-results.path: /results/
  web.panels.scan-health.label: SCAN HEALTH
  web.panels.scan-health.url: "${SCAN_PANELS_URL:-http://localhost:8095}"
  web.panels.scan-health.path: /health-panel/
  web.panels.scan-health.health_endpoint: /health

# ── Event dispatch (optional) ────────────────────────────────────────────────
# Turns external events (webhooks) into headless agent runs. This ships a set of
# control-system-free tutorial triggers so you can exercise the pipeline with a
# single `curl` after `osprey deploy up`. Remove this block to disable dispatch.
dispatch:
  triggers: tutorial_triggers.yml   # bundled with OSPREY; resolved at build time
  worker_count: 1
  workspace_mode: isolated
  max_concurrent_runs: 2
  max_queue_depth: 50

# ── Environment variables ────────────────────────────────────────────────────
# Bearer tokens guarding the dispatcher's inbound webhook/dashboard auth
# (EVENT_DISPATCHER_TOKEN) and the dispatcher→worker calls (DISPATCH_WORKER_TOKEN).
# No defaults on purpose: the dispatch services fail closed on an unset token.
# `osprey deploy up` auto-generates a strong random value for each unset token
# into the project .env (and logs where), so a fresh deploy is secure by default
# with zero editing. Set your own values in .env to override.
env:
  required:
    - EVENT_DISPATCHER_TOKEN
    - DISPATCH_WORKER_TOKEN
