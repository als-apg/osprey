# control-assistant-readonly.yml
# Read-only persona — the analysis tier of the control-assistant multi-user stack.
#
# This preset inherits everything from `control-assistant` and pins the write
# switch off. `control_system.writes_enabled: false` is enforced at every
# write surface: channel-write tools land in the rendered settings.json deny
# list, the writes-check hook refuses with a clean "writes disabled" message,
# and the connector's reference monitor blocks any write that somehow reaches
# it. Reads, the channel finder, the archiver, logbook search, and the scan
# panels all work unchanged.
#
# The write-capable counterpart is `control-assistant-readwrite`.

name: Control Assistant (Read-Only)

extends: control-assistant

# Attached project: the persona builds per-user terminal images only and
# connects to the shared web tier + scan services the hosting control-assistant
# project deploys on the same host. No services are scaffolded (empty
# `deployed_services`, no services/) — the bluesky/VA/panels/dispatch injector
# blocks inherited from the base are all gated on this flag and skip cleanly.
deploy_services: false

# ── Config overrides ─────────────────────────────────────────────────────────
# Dotted keys ONLY: each entry is a literal `key.path` written into config.yml
# after the template renders. Nested YAML under `config:` would deep-merge into
# and clobber the base's rendered config subtree, so keep every override flat.
config:
  # The single axis this persona differs on. The tutorial base arms writes for
  # its own single-user agent, so this tier boundary MUST be pinned explicitly
  # here — it is what makes the read-only terminal read-only.
  control_system.writes_enabled: false
  # Attached persona: the hosting project owns the web-terminal tier (nginx,
  # landing, per-user containers). Without this override the inherited roster
  # would make a persona-dir deploy try to host a second web tier on the same
  # host ports.
  modules.web_terminals.enabled: false
