# control-assistant-physicist.yml
# Physicist persona — the full-capability tier of the control-assistant demo.
#
# This preset inherits everything from `control-assistant` and keeps the
# bluesky MCP server enabled. With the bluesky server on, the physicist can
# author and launch the two shipped scan-plan types — an orbit response_matrix
# and an n-dimensional grid_scan — through the Bluesky bridge.
#
# The bluesky server's BLUESKY_BRIDGE_URL defaults to 127.0.0.1:8090, matching
# the bridge port the base ships, so no extra wiring is needed to reach it.

name: Control Assistant (Physicist)

extends: control-assistant

# Attached project: the persona builds per-user terminal images only and
# connects to the shared services stack another OSPREY project deploys on the
# same host. No services are scaffolded (empty `deployed_services`, no services/).
deploy_services: false

# ── Config overrides ─────────────────────────────────────────────────────────
# Dotted keys ONLY: each entry is a literal `key.path` written into config.yml
# after the template renders. Nested YAML under `config:` would deep-merge into
# and clobber the base's rendered config subtree, so keep every override flat.
config:
  # Keep the bluesky MCP server on. The base tutorial preset already enables
  # it, but the physicist tier states it explicitly: this is the capability
  # that distinguishes the tier from the operator (which overrides it off),
  # and it must hold even if the base default ever changes.
  claude_code.servers.bluesky.enabled: true
  # Attached persona: the hosting project owns the web-terminal tier (nginx,
  # landing, per-user containers). Without this override the inherited roster
  # would make a persona-dir deploy try to host a second web tier on the same
  # host ports.
  modules.web_terminals.enabled: false
