name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      e2e_filter:
        description: >-
          Optional pytest path/keyword filter for the E2E job (debug-only;
          PR runs always use the full suite). Example:
          'tests/e2e/test_rf_cavity_correlation_scenario.py
          tests/e2e/test_vacuum_burst_scenario.py'
        required: false
        default: ''
      run_benchmarks:
        description: >-
          Run the on-demand benchmark lanes (channel-finder MCP benchmarks)
          instead of the E2E lane. The home for e2e suites that are useful
          but too expensive to run on every PR — trigger before a release or
          after touching the code they exercise.
        required: false
        type: boolean
        default: false
  schedule:
    # Nightly at 07:00 UTC (midnight Pacific) for the always-on jobs
    # (test, lint, docs, ...; no `if:`). Every e2e/benchmark lane is
    # PR-gated or dispatch-gated and does NOT run on this schedule.
    - cron: '0 7 * * *'

# Note: This workflow runs tests, linting, docs build, and package checks
# For documentation deployment to GitHub Pages, see .github/workflows/docs.yml

# Pull openobserve from our ghcr mirror rather than ECR Public. ECR Public
# rate-limits anonymous pulls per source IP and GitHub-hosted runners share
# egress IPs, so E2E deploys intermittently died on
# "toomanyrequests: Rate exceeded". Set at workflow level because the ref is
# identical in every deploying job; jobs that don't deploy ignore it.
#
# The mirror is PRIVATE, so each deploying job also needs the ghcr login step.
# Populate/refresh it with .github/workflows/mirror-openobserve.yml, which must
# be re-run whenever the pin in
# src/osprey/templates/services/openobserve/docker-compose.yml.j2 moves.
env:
  OSPREY_OPENOBSERVE_IMAGE: ghcr.io/als-apg/openobserve:v0.14.4

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      # virtual-accelerator: tests/va/{test_record_factory,test_apply_fault}.py
      # import softioc, which lives in the virtual-accelerator extra (not dev).
      # Without it these unit tests error at collection on a fresh runner.
      #
      # The bluesky stack (bluesky/ophyd-async/tiled) is a core dependency, so
      # plain `uv sync` carries it. tests/services/bluesky_bridge/* guard their
      # imports with `pytest.importorskip` and would SKIP silently if the stack
      # ever left the install set — test_ci_workflow_wiring.py pins the stack in
      # [project] dependencies for that reason.
      run: uv sync --extra dev --extra virtual-accelerator

    - name: Run unit tests
      # Coverage is measured only on the cell that uploads to Codecov below —
      # the other three cells were paying ~25% runtime (measured) for a report
      # nobody reads. Deliberately NOT pytest-xdist-parallelized: the unit
      # suite relies on serial collection order to dodge cross-test
      # global-state bleed (stdlib subprocess.run monkeypatches, loguru sink
      # reconfiguration), and under -n 4 it flakes ~1 test per run with a
      # different victim each time. Parallelizing this lane first requires
      # fixing that isolation debt.
      run: |
        if [ "${{ matrix.python-version }}" = "3.11" ] && [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          COV_ARGS="--cov=src/osprey --cov-report=xml --cov-report=term"
        else
          COV_ARGS=""
        fi
        uv run pytest tests/ --ignore=tests/e2e -v --tb=short $COV_ARGS

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v7
      if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint and Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run ruff (linting)
      run: |
        uv run ruff check src/ tests/ --output-format=github

    - name: Run ruff (formatting)
      run: |
        uv run ruff format --check src/ tests/

    - name: Run mypy (type checking)
      run: |
        uv run mypy src/ --no-error-summary || true
      continue-on-error: true

  docs:
    name: Documentation Build (Check Only)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra docs

    - name: Build documentation
      run: |
        cd docs
        uv run make html

    - name: Check for broken links
      run: |
        cd docs
        uv run make linkcheck || true
      continue-on-error: true

    - name: Upload documentation artifact
      uses: actions/upload-artifact@v7
      if: github.event_name == 'pull_request'
      with:
        name: documentation-preview
        path: docs/build/html
        retention-days: 7

  package:
    name: Package Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Build package
      run: uv build

    - name: Check package
      run: uvx twine check dist/*

    - name: Upload package artifacts
      uses: actions/upload-artifact@v7
      with:
        name: package
        path: dist/
        retention-days: 7

  static-checks:
    name: Tier 0 — Static (preset YAML, skill ↔ MCP-tool consistency)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run Tier 0 static checks
      run: uv run pytest tests/integration/test_preset_static.py -v --tb=short

  visual-theming:
    name: Behavioral + Visual Theming (Playwright, design system)
    runs-on: ubuntu-latest
    # The default GITHUB_TOKEN is read-only repo-wide; this job's last step
    # pushes regenerated Linux baselines back to the PR branch, so it alone
    # needs contents: write (matches docs.yml's workflow-level grant for the
    # same reason — gh-pages push — scoped here to just this job instead of
    # the whole ci.yml workflow).
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    # Job-level "paths" isn't a thing in GitHub Actions — dorny/paths-filter
    # computes it as a step output instead, so every later step can gate on
    # it. An unrelated PR still gets a green (not skipped) job: every gated
    # step no-ops, which reports as job success, same as any other
    # conditionally-skipped step in this workflow.
    - name: Detect design-system / dispatch dashboard changes
      id: changes
      uses: dorny/paths-filter@v4
      with:
        filters: |
          theming:
            - 'src/osprey/interfaces/**'
            - 'src/osprey/dispatch/**'
            - 'tests/interfaces/design_system/**'
            - 'tests/interfaces/web_terminal/**'
            - 'tests/interfaces/conftest.py'
            - 'tests/interfaces/_browser.py'
            - 'tests/interfaces/test_load_smokes.py'

    - name: Install uv
      if: steps.changes.outputs.theming == 'true'
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      if: steps.changes.outputs.theming == 'true'
      run: uv python install 3.11

    - name: Install dependencies
      if: steps.changes.outputs.theming == 'true'
      run: uv sync --extra dev

    - name: Install Playwright chromium
      if: steps.changes.outputs.theming == 'true'
      run: uv run playwright install chromium --with-deps

    - name: Run behavioral theming suite
      if: steps.changes.outputs.theming == 'true'
      run: |
        uv run pytest tests/interfaces/design_system/test_behavioral.py \
          tests/interfaces/web_terminal/test_panels_browser.py \
          tests/interfaces/web_terminal/test_contract_params.py \
          tests/interfaces/web_terminal/test_logout_resume_browser.py \
          tests/interfaces/test_load_smokes.py -v --tb=short

    - name: Run visual regression suite
      # Linux is the authoritative platform for the pixel diff (see
      # test_visual.py's module docstring); this runner IS that platform.
      # A missing baseline is written on the spot — see the "commit" step
      # below for how a first-time/updated baseline lands back in the repo.
      if: steps.changes.outputs.theming == 'true'
      run: uv run pytest tests/interfaces/design_system/test_visual.py -v --tb=short

    - name: Upload Linux-rendered baselines artifact
      if: steps.changes.outputs.theming == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: visual-baselines-linux
        path: tests/interfaces/design_system/baselines/*.png
        retention-days: 14

    - name: Commit new/updated Linux baselines back to the PR branch
      # Only for same-repo PRs — forks can't push, and main pushes have
      # nothing to compare against (baselines only ever change via a PR).
      if: >-
        steps.changes.outputs.theming == 'true' &&
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: "chore(visual): update Linux-rendered theming baseline(s) [skip ci]"
        file_pattern: 'tests/interfaces/design_system/baselines/*.png'
        commit_user_name: "github-actions[bot]"
        commit_user_email: "github-actions[bot]@users.noreply.github.com"

  frontend-js:
    name: Frontend JS (typecheck + lint + vitest)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Install JS dependencies
      # `npm install --no-package-lock`, not `npm ci`: the committed
      # package-lock.json records a resolved entry only for the host platform's
      # rollup binary (the lock is authored on macOS), and both `npm ci` AND a
      # plain `npm install` honor that incomplete tree, so the Linux runner
      # never installs @rollup/rollup-linux-x64-gnu that vitest needs (npm
      # optional-deps bug, npm/cli#4828 — its own error message says to ignore
      # the lockfile). `--no-package-lock` resolves fresh from package.json and
      # installs the correct platform binary. This is a dev/CI-only
      # typecheck+test job, so strict lock reproduction is not required here.
      run: npm install --no-package-lock

    - name: Typecheck (tsc --noEmit)
      run: npm run typecheck

    - name: Lint (eslint)
      run: npm run lint

    - name: Run JS tests (vitest)
      run: npm run test:js

  build-boot-smoke:
    name: Tier 1 — Build + MCP boot (${{ matrix.preset }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [hello-world, control-assistant]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Cache uv project-venv downloads
      uses: actions/cache@v6
      with:
        path: ~/.cache/uv
        key: uv-buildboot-${{ runner.os }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-buildboot-${{ runner.os }}-

    - name: Run Tier 1 boot smoke for preset
      env:
        PRESET: ${{ matrix.preset }}
      run: |
        uv run pytest tests/integration/test_build_boot.py -v --tb=short -k "$PRESET"

  agentic-per-preset:
    name: Tier 3 — Agentic flow (${{ matrix.preset }})
    runs-on: ubuntu-latest
    # Only run on PRs from same repo (ALS_APG_API_KEY unavailable on forks).
    # Gating (no continue-on-error): a red Tier 3 flow blocks the merge like
    # every other e2e lane — the house rule is full green, no advisory tiers.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        preset: [hello-world, control-assistant]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Log in to ghcr (openobserve mirror)
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Pre-flight LLM endpoint reachability check
      env:
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
      run: |
        # Defense in depth: surface "secret unset" or "GitHub Actions IP not
        # allowlisted" failures clearly here, instead of buried under confusing
        # 4xx errors flooding pytest output 5+ minutes later.
        # See CHANGELOG entry on the cborg → ALS-APG CI swap for full context.
        if [ -z "${ALS_APG_API_KEY:-}" ]; then
          echo "❌ ALS_APG_API_KEY secret is not set on this runner"
          echo "   (Check repo secrets; required for the agentic-per-preset job.)"
          exit 1
        fi
        HTTP_CODE=$(curl -sS -o /tmp/probe.txt -w "%{http_code}" --max-time 15 \
          -X POST https://llm.gianlucamartino.com/v1/messages \
          -H "Content-Type: application/json" \
          -H "anthropic-version: 2023-06-01" \
          -H "Authorization: Bearer $ALS_APG_API_KEY" \
          -d '{"model":"claude-haiku-4-5-20251001","max_tokens":4,"messages":[{"role":"user","content":"ping"}]}')
        if [ "$HTTP_CODE" != "200" ]; then
          echo "❌ ALS-APG endpoint probe failed (HTTP $HTTP_CODE)"
          echo "   Body (first 500 chars):"
          head -c 500 /tmp/probe.txt; echo
          echo "   If 401/403: rotate ALS_APG_API_KEY or check IP allowlist."
          echo "   If 5xx: ALS-APG outage — retry, or contact the proxy admin."
          exit 1
        fi
        echo "✅ ALS-APG endpoint reachable (HTTP 200)"

    - name: Run Tier 3 agentic test for preset
      env:
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
        PRESET: ${{ matrix.preset }}
      run: |
        # template names use snake_case in init_project (e.g. hello_world);
        # the matrix entry is the kebab-case preset id, which appears in the
        # function name (test_hello_world_*) so -k matches both.
        PRESET_K="${PRESET//-/_}"
        uv run pytest tests/e2e/test_preset_agentic.py -v --tb=short -k "$PRESET_K"

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Only run on PRs (not pushes) to control API costs, and only for non-fork PRs (secrets unavailable on forks).
    # Also runs on manual workflow_dispatch to enable scoped reruns via the e2e_filter input —
    # unless that dispatch asked for the benchmark lanes instead (run_benchmarks).
    if: (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || (github.event_name == 'workflow_dispatch' && !inputs.run_benchmarks)
    # The lane's healthy runtime is ~20-25min (real-LLM SDK/CLI pipelines —
    # every full-stack docker deploy now lives in its own dedicated job, and
    # the channel-finder benchmarks moved to the nightly schedule); a run past
    # the cap means a test is wedged on a dead endpoint or a leaked container
    # stack, and the useful signal is the timeout itself, not more runner time.
    timeout-minutes: 40

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Log in to ghcr (openobserve mirror)
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Pre-flight LLM endpoint reachability check
      env:
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
      run: |
        # Same probe as agentic-per-preset; see comment there for rationale.
        if [ -z "${ALS_APG_API_KEY:-}" ]; then
          echo "❌ ALS_APG_API_KEY secret is not set on this runner"
          exit 1
        fi
        HTTP_CODE=$(curl -sS -o /tmp/probe.txt -w "%{http_code}" --max-time 15 \
          -X POST https://llm.gianlucamartino.com/v1/messages \
          -H "Content-Type: application/json" \
          -H "anthropic-version: 2023-06-01" \
          -H "Authorization: Bearer $ALS_APG_API_KEY" \
          -d '{"model":"claude-haiku-4-5-20251001","max_tokens":4,"messages":[{"role":"user","content":"ping"}]}')
        if [ "$HTTP_CODE" != "200" ]; then
          echo "❌ ALS-APG endpoint probe failed (HTTP $HTTP_CODE)"
          head -c 500 /tmp/probe.txt; echo
          exit 1
        fi
        echo "✅ ALS-APG endpoint reachable (HTTP 200)"

    - name: Run E2E tests
      # E2E_FILTER comes from workflow_dispatch `inputs.e2e_filter` and is
      # empty on push/PR/schedule triggers, so the full-suite command runs
      # by default. The filter is a debug-only convenience for scoped CI
      # reruns — PR merge gate always exercises the full suite. Workflow
      # inputs require repo write access; treat as trusted (same level as
      # this file).
      env:
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
        E2E_FILTER: ${{ inputs.e2e_filter }}
      run: |
        if [ -n "$E2E_FILTER" ]; then
          echo "Running scoped E2E filter: $E2E_FILTER"
          # Word-splitting on $E2E_FILTER is intentional so callers can
          # pass multiple paths or extra pytest args in one input.
          uv run pytest $E2E_FILTER -v --tb=short
        else
          # Tier 3 per-preset agentic flows live in their own matrix job
          # (agentic-per-preset). The full Docker-stack tests
          # (dispatch-deploy-e2e, dispatch-overlay-e2e, bluesky-deploy-e2e,
          # tiled-roundtrip-e2e, va-substrate-equivalence-e2e,
          # orm-roundtrip-e2e, bluesky-catalog-e2e,
          # bluesky-sandbox-escape-e2e, multi-user-demo-e2e,
          # multi-user-deploy-lifecycle-e2e) and the Dockerfile e2e
          # (dockerfile-e2e) each have their own job because they build
          # container images. Exclude them all here to avoid
          # double-execution — and because full-stack deploys leave
          # host-global residue (fixed `<prefix>-web-<user>`/`<prefix>-nginx`
          # container names, the host-global openobserve data volume with
          # root creds pinned on first init) that breaks later tests sharing
          # this runner. NOTE: "--ignore" means "not in this secret-gated
          # LLM lane," NOT "not tested" — every ignored file below runs in
          # its own job (the deploy-lifecycle jobs run on PRs into main
          # only — see those jobs' comments), except the channel-finder
          # benchmarks, which run on demand via the run_benchmarks
          # dispatch input (channel-finder-benchmarks): they are a
          # statistical quality score with flaky reruns, not a per-PR
          # correctness gate.
          # -n 4 --dist loadfile (pytest-xdist): this lane is ~18 min of
          # real-LLM round-trips at near-zero CPU, so four workers cut it to
          # roughly the slowest single file. loadfile (not load) keeps every
          # file's tests on one worker, preserving in-file ordering and
          # module-scoped fixtures — the documented registry-order hazard is
          # about mixing e2e with unit tests, not about file-level
          # parallelism. The only fixed-port stacks in this lane
          # (grid-scan/ORM VA on 5064) are GitHub-Actions-skipped anyway.
          uv run pytest tests/e2e/ -v --tb=short -n 4 --dist loadfile \
            --ignore=tests/e2e/test_preset_agentic.py \
            --ignore=tests/e2e/test_dispatch_deploy.py \
            --ignore=tests/e2e/test_dispatch_overlay_visibility.py \
            --ignore=tests/e2e/test_bluesky_deploy.py \
            --ignore=tests/e2e/test_dockerfile_e2e.py \
            --ignore=tests/e2e/test_tiled_roundtrip.py \
            --ignore=tests/e2e/test_va_substrate_equivalence.py \
            --ignore=tests/e2e/test_orm_roundtrip.py \
            --ignore=tests/e2e/test_bluesky_catalog_e2e.py \
            --ignore=tests/e2e/test_bluesky_sandbox_escape_e2e.py \
            --ignore=tests/e2e/test_bluesky_panels_deploy.py \
            --ignore=tests/e2e/test_multi_user_demo.py \
            --ignore=tests/e2e/test_deploy_lifecycle.py \
            --ignore=tests/e2e/claude_code/test_channel_finder_mcp_benchmarks.py
        fi

  channel-finder-benchmarks:
    name: Channel-Finder MCP Benchmarks (on demand)
    runs-on: ubuntu-latest
    # Manual-only, via the `run_benchmarks` workflow_dispatch input (Actions
    # tab "Run workflow", or `gh workflow run ci.yml -f run_benchmarks=true`):
    # this is a statistical quality benchmark (F1/perfect-match thresholds
    # over ~30 real LLM channel-finder queries, flaky-rerun-heavy), not a
    # per-PR correctness gate. It used to run inside the shared e2e-tests
    # lane on every PR (~4min of the lane); like every benchmark in this
    # repo it is human-babysat — run it deliberately before a release or
    # after touching the channel-finder/MCP code, and read the scores in the
    # job log. Deliberately NOT in all-checks-passed's needs — a
    # dispatch-gated job has no result on PR runs. This job is the intended
    # home for future too-expensive-per-PR e2e lanes as well.
    if: github.event_name == 'workflow_dispatch' && inputs.run_benchmarks
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Pre-flight LLM endpoint reachability check
      env:
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
      run: |
        # Same probe as e2e-tests: fail fast if the proxy is unreachable.
        if [ -z "${ALS_APG_API_KEY:-}" ]; then
          echo "❌ ALS_APG_API_KEY secret is not set on this runner"
          exit 1
        fi
        HTTP_CODE=$(curl -sS -o /tmp/probe.txt -w "%{http_code}" --max-time 15 \
          -X POST https://llm.gianlucamartino.com/v1/messages \
          -H "Content-Type: application/json" \
          -H "anthropic-version: 2023-06-01" \
          -H "Authorization: Bearer $ALS_APG_API_KEY" \
          -d '{"model":"claude-haiku-4-5-20251001","max_tokens":4,"messages":[{"role":"user","content":"ping"}]}')
        if [ "$HTTP_CODE" != "200" ]; then
          echo "❌ ALS-APG endpoint probe failed (HTTP $HTTP_CODE)"
          head -c 500 /tmp/probe.txt; echo
          exit 1
        fi
        echo "✅ ALS-APG endpoint reachable (HTTP 200)"

    - name: Run channel-finder MCP benchmarks
      env:
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
      run: |
        uv run pytest tests/e2e/claude_code/test_channel_finder_mcp_benchmarks.py -v --tb=short

  deploy-e2e:
