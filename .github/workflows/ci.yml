      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v2

    - name: Install osprey
      run: uv sync --extra dev

    - name: Run bluesky panels deploy E2E
      run: |
        uv run pytest tests/e2e/test_bluesky_panels_deploy.py -v --tb=short

  va-substrate-equivalence-e2e:
    name: VA Substrate Equivalence E2E (virtual accelerator + bluesky bridge, full Docker stack)
    runs-on: ubuntu-latest
    # Only run on PRs from same repo (mirrors bluesky-deploy-e2e gating). This
    # job needs no secrets — neither the bridge nor the virtual accelerator
    # shells out to an LLM. Phase-1 bug fix: this test previously had no
    # dedicated job and was only ever swept into e2e-tests' glob (the
    # secret-gated LLM lane), contradicting its own docstring ("never
    # collected by the fast lane"). This job is that missing lane.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    # The VA image build + `osprey deploy up` inside the test carry their own
    # generous internal timeouts (5min build, 20min deploy-up) to absorb a
    # cold image cache; that's 25min before the five CA proofs (P1-P5, with
    # P1-P4 each eligible for one flaky rerun) even start. This job is
    # materially heavier than tiled-roundtrip-e2e (co-deploys VA + bridge,
    # builds a PyAT image), and it has never run in CI before (see the run
    # step below) — a too-tight timeout must not be what reds its first PR.
    timeout-minutes: 45

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Log in to ghcr (openobserve mirror)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v2

    - name: Install osprey
      run: uv sync --extra dev

    - name: Run VA substrate equivalence E2E
      run: |
        uv run pytest tests/e2e/test_va_substrate_equivalence.py -v --tb=short

  tiled-roundtrip-e2e:
    name: Tiled Roundtrip E2E (bluesky bridge + Tiled persistence, full Docker stack)
    runs-on: ubuntu-latest
    # Only run on PRs from same repo (mirrors bluesky-deploy-e2e gating). This
    # job needs no secrets — the bridge never shells out to an LLM — but the
    # same-repo restriction is the house policy for any extra
    # Docker-build-and-deploy job, not just secret-gated ones.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    # Builds the bridge image and pulls ghcr.io/bluesky/tiled:0.2.12; ~6.5min
    # with images cached, ~9-11min cold. bluesky-deploy-e2e has no explicit
    # timeout-minutes; this job gets one for the extra image-pull headroom.
    timeout-minutes: 20

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Log in to ghcr (openobserve mirror)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v2

    - name: Install osprey
      run: uv sync --extra dev

    - name: Run Tiled roundtrip E2E
      run: |
        uv run pytest tests/e2e/test_tiled_roundtrip.py -v --tb=short

  bluesky-catalog-e2e:
    name: Bluesky Catalog E2E (layered plan catalog, full Docker stack)
    runs-on: ubuntu-latest
    # ADVISORY LANE: deliberately NOT in all-checks-passed's `needs:` list —
    # read this job's own log to see whether it passed. Only run on PRs from
    # same repo (mirrors bluesky-deploy-e2e/tiled-roundtrip-e2e gating). This
    # job needs no secrets — the bridge never shells out to an LLM — and no
    # amd64-emulated Virtual Accelerator image (demo_runner mode: real
    # RunEngine, mock devices, no EPICS), so it's comparable in weight to
    # bluesky-deploy-e2e rather than va-substrate-equivalence-e2e.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Log in to ghcr (openobserve mirror)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v2

    - name: Install osprey
      run: uv sync --extra dev

    - name: Run bluesky catalog E2E
      run: |
        uv run pytest tests/e2e/test_bluesky_catalog_e2e.py -v --tb=short

  bluesky-sandbox-escape-e2e:
    name: Bluesky Sandbox Escape E2E (session-plan authoring gates, full Docker stack)
    runs-on: ubuntu-latest
    # ADVISORY LANE: deliberately NOT in all-checks-passed's `needs:` list —
    # read this job's own log to see whether it passed (mirrors
    # bluesky-catalog-e2e's advisory precedent). Only run on PRs from same repo
    # (mirrors bluesky-deploy-e2e/va-substrate-equivalence-e2e gating). This job
    # needs no secrets — neither the bridge nor the virtual accelerator
    # shells out to an LLM — but DOES need the amd64-emulated Virtual
    # Accelerator image (the negative case's IOC no-write proof reads a real
    # corrector setpoint over Channel Access, independent of the bridge), so
    # it's as heavy as va-substrate-equivalence-e2e, not bluesky-catalog-e2e.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 45

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Log in to ghcr (openobserve mirror)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v2

    - name: Install osprey
      run: uv sync --extra dev

    - name: Run bluesky sandbox escape E2E
      run: |
        uv run pytest tests/e2e/test_bluesky_sandbox_escape_e2e.py -v --tb=short

  dockerfile-e2e:
    name: Dockerfile E2E (generated container image)
    runs-on: ubuntu-latest
    # Only run on PRs from same repo (mirrors deploy-e2e gating)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install osprey
      run: uv sync --extra dev

    - name: Run Dockerfile E2E
      env:
        # Install the PR branch inside the image (not the PyPI release) so
        # the generated Dockerfile is tested against the code under review.
        OSPREY_E2E_PIP_SPEC: git+https://github.com/${{ github.repository }}.git@${{ github.event.pull_request.head.sha }}
        # Drives the real-LLM round-trip in test_generated_image_serves_agent_
        # over_http (injected into the container at run time). The build/boot
        # test needs no key; the HTTP test auto-skips (requires_als_apg) if the
        # secret is ever absent, so this stays advisory and self-gating.
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
      run: uv run pytest tests/e2e/test_dockerfile_e2e.py -v --tb=short

  multi-user-deploy-lifecycle-e2e:
    name: Multi-User Deploy Lifecycle E2E (epic→main only, real container runtime)
    runs-on: ubuntu-latest
    # Deliberately NOT gated like deploy-e2e/scan-deploy-e2e/etc. (which run on
    # every same-repo PR). This job drives REAL, destructive container/volume
    # lifecycle operations (decommission/prune/nuke) against the runtime, so it
    # only runs at the epic-integration-branch -> main boundary, not on every
    # per-phase PR into an epic/* branch — matching how the epic workflow
    # already scopes its own heavier gates. It is intentionally NOT part of
    # every epic-phase PR's checks; be honest about that scoping rather than
    # implying this runs on every PR the way the jobs above do.
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v2

    - name: Install osprey
      run: uv sync --extra dev

    - name: Run multi-user deploy lifecycle E2E
      run: |
        uv run pytest tests/e2e/test_deploy_lifecycle.py -v --tb=short

    # Belt-and-suspenders on top of the test's own try/finally teardown: every
    # resource named here is exact (never a prune/-a/wildcard), matching
    # tests/e2e/test_deploy_lifecycle.py's own container-ops safety guardrail.
    - name: Clean up any stranded lifecycle-e2e resources
      if: always()
      run: |
        for user in alice bob carol dave erin; do
          docker rm -f "e2e-web-${user}" || true
          docker volume rm "osprey-e2e-mus-p3_${user}-claude-config" || true
          docker volume rm "osprey-e2e-mus-p3_${user}-agent-data" || true
        done
        docker rm -f e2e-nginx || true
        docker rm -f osprey-e2e-mus-p3-registry || true
        docker compose -p osprey-e2e-mus-p3 down || true

  multi-user-deploy-lifecycle-e2e-podman:
    name: Multi-User Deploy Lifecycle E2E (epic→main only, podman runtime)
    runs-on: ubuntu-latest
    # Podman counterpart of multi-user-deploy-lifecycle-e2e above — same job,
    # same real-runtime lifecycle mechanics, run against rootless podman
    # instead of docker (tests/e2e/test_deploy_lifecycle.py picks its runtime
    # from OSPREY_E2E_RUNTIME). Scoped identically: epic-integration-branch ->
    # main only, same-repo PRs only — not part of every epic-phase PR's checks.
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Set up rootless Podman
      run: |
        podman --version
        pip install --user podman-compose
        podman compose version

    - name: Install osprey
      run: uv sync --extra dev

    - name: Run multi-user deploy lifecycle E2E (podman)
      env:
        OSPREY_E2E_RUNTIME: podman
        # Explicit belt-and-suspenders alongside the test's own RUNTIME ->
        # CONTAINER_RUNTIME coupling (see _run_osprey): makes the deploy-side
        # runtime selection self-documenting here too, not just inferred.
        CONTAINER_RUNTIME: podman
      run: |
        uv run pytest tests/e2e/test_deploy_lifecycle.py -v --tb=short

    # Belt-and-suspenders on top of the test's own try/finally teardown: every
    # resource named here is exact (never a prune/-a/wildcard), matching
    # tests/e2e/test_deploy_lifecycle.py's own container-ops safety guardrail.
    - name: Clean up any stranded lifecycle-e2e resources
      if: always()
      run: |
        for user in alice bob carol dave erin; do
          podman rm -f "e2e-web-${user}" || true
          podman volume rm "osprey-e2e-mus-p3_${user}-claude-config" || true
          podman volume rm "osprey-e2e-mus-p3_${user}-agent-data" || true
        done
        podman rm -f e2e-nginx || true
        podman rm -f osprey-e2e-mus-p3-registry || true
        podman compose -p osprey-e2e-mus-p3 down || true

  all-checks-passed:
    name: All CI Checks Passed
    needs: [test, lint, docs, package, static-checks, visual-theming, frontend-js, build-boot-smoke, e2e-tests, deploy-e2e, dispatch-deploy-e2e, bluesky-deploy-e2e, bluesky-panels-deploy-e2e, va-substrate-equivalence-e2e, tiled-roundtrip-e2e, dockerfile-e2e, agentic-per-preset]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Check all jobs status
      run: |
        if [[ "${{ needs.test.result }}" != "success" ]]; then
          echo "❌ Tests failed"
          exit 1
        fi
        if [[ "${{ needs.lint.result }}" != "success" ]]; then
          echo "❌ Lint checks failed"
          exit 1
        fi
        if [[ "${{ needs.docs.result }}" != "success" ]]; then
          echo "❌ Documentation build failed"
          exit 1
        fi
        if [[ "${{ needs.package.result }}" != "success" ]]; then
          echo "❌ Package build failed"
          exit 1
        fi
        if [[ "${{ needs.static-checks.result }}" != "success" ]]; then
          echo "❌ Tier 0 static checks failed"
          exit 1
        fi
        if [[ "${{ needs.visual-theming.result }}" != "success" ]]; then
          echo "❌ Behavioral/visual theming suite failed"
          exit 1
        fi
        if [[ "${{ needs.frontend-js.result }}" != "success" ]]; then
          echo "❌ Frontend JS (typecheck + vitest) failed"
          exit 1
        fi
        if [[ "${{ needs.build-boot-smoke.result }}" != "success" ]]; then
          echo "❌ Tier 1 build + boot smoke failed"
          exit 1
        fi
        # Tier 3 agentic-per-preset: advisory (continue-on-error in job)
        if [[ "${{ needs.agentic-per-preset.result }}" == "failure" ]]; then
          echo "⚠️  Agentic per-preset failed (non-blocking, LLM-dependent)"
        elif [[ "${{ needs.agentic-per-preset.result }}" == "skipped" ]]; then
          echo "⏭️  Agentic per-preset skipped (only run on PRs)"
        else
          echo "✅ Agentic per-preset passed"
        fi
        # E2E tests: advisory (LLM-dependent, may fail due to rate limits)
        if [[ "${{ needs.e2e-tests.result }}" == "failure" ]]; then
          echo "⚠️  E2E tests failed (non-blocking, LLM-dependent)"
        elif [[ "${{ needs.e2e-tests.result }}" == "skipped" ]]; then
          echo "⏭️  E2E tests skipped (only run on PRs)"
        else
          echo "✅ E2E tests passed"
        fi
        # Deploy E2E: advisory (LLM-dependent, may fail due to rate limits)
        if [[ "${{ needs.deploy-e2e.result }}" == "failure" ]]; then
          echo "⚠️  Deploy E2E test failed (non-blocking, LLM-dependent)"
        elif [[ "${{ needs.deploy-e2e.result }}" == "skipped" ]]; then
          echo "⏭️  Deploy E2E test skipped (only run on PRs)"
        else
          echo "✅ Deploy E2E test passed"
        fi
        # Dispatch Deploy E2E: advisory (Docker build + LLM-dependent)
        if [[ "${{ needs.dispatch-deploy-e2e.result }}" == "failure" ]]; then
          echo "⚠️  Dispatch deploy E2E failed (non-blocking, Docker + LLM-dependent)"
        elif [[ "${{ needs.dispatch-deploy-e2e.result }}" == "skipped" ]]; then
          echo "⏭️  Dispatch deploy E2E skipped (only run on PRs)"
        else
          echo "✅ Dispatch deploy E2E passed"
        fi
        # Bluesky Deploy E2E: advisory (Docker-dependent, no LLM involved)
        if [[ "${{ needs.bluesky-deploy-e2e.result }}" == "failure" ]]; then
          echo "⚠️  Bluesky deploy E2E failed (non-blocking, Docker-dependent)"
        elif [[ "${{ needs.bluesky-deploy-e2e.result }}" == "skipped" ]]; then
          echo "⏭️  Bluesky deploy E2E skipped (only run on PRs)"
        else
          echo "✅ Bluesky deploy E2E passed"
        fi
        # Bluesky Panels Deploy E2E: advisory (Docker-dependent, no LLM involved)
        if [[ "${{ needs.bluesky-panels-deploy-e2e.result }}" == "failure" ]]; then
          echo "⚠️  Bluesky panels deploy E2E failed (non-blocking, Docker-dependent)"
        elif [[ "${{ needs.bluesky-panels-deploy-e2e.result }}" == "skipped" ]]; then
          echo "⏭️  Bluesky panels deploy E2E skipped (only run on PRs)"
        else
          echo "✅ Bluesky panels deploy E2E passed"
        fi
        # VA Substrate Equivalence E2E: advisory (Docker-dependent, no LLM involved)
        if [[ "${{ needs.va-substrate-equivalence-e2e.result }}" == "failure" ]]; then
          echo "⚠️  VA substrate equivalence E2E failed (non-blocking, Docker-dependent)"
        elif [[ "${{ needs.va-substrate-equivalence-e2e.result }}" == "skipped" ]]; then
          echo "⏭️  VA substrate equivalence E2E skipped (only run on PRs)"
        else
          echo "✅ VA substrate equivalence E2E passed"
        fi
        # Tiled Roundtrip E2E: advisory (Docker-dependent, no LLM involved)
        if [[ "${{ needs.tiled-roundtrip-e2e.result }}" == "failure" ]]; then
          echo "⚠️  Tiled roundtrip E2E failed (non-blocking, Docker-dependent)"
        elif [[ "${{ needs.tiled-roundtrip-e2e.result }}" == "skipped" ]]; then
          echo "⏭️  Tiled roundtrip E2E skipped (only run on PRs)"
        else
          echo "✅ Tiled roundtrip E2E passed"
        fi
        # Dockerfile E2E: advisory (network-dependent: PyPI, claude.ai installer)
        if [[ "${{ needs.dockerfile-e2e.result }}" == "failure" ]]; then
          echo "⚠️  Dockerfile E2E failed (non-blocking, network-dependent)"
        elif [[ "${{ needs.dockerfile-e2e.result }}" == "skipped" ]]; then
          echo "⏭️  Dockerfile E2E skipped (only run on PRs)"
        else
          echo "✅ Dockerfile E2E passed"
        fi
        echo "✅ All CI checks passed!"
