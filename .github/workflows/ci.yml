name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      e2e_filter:
        description: >-
          Optional pytest path/keyword filter for the E2E job (debug-only;
          PR runs always use the full suite). Example:
          'tests/e2e/test_rf_cavity_correlation_scenario.py
          tests/e2e/test_vacuum_burst_scenario.py'
        required: false
        default: ''
  schedule:
    # Nightly at 07:00 UTC (midnight Pacific). Tier 4 (provider matrix,
    # benchmarks) gates on github.event_name == 'schedule'.
    - cron: '0 7 * * *'

# Note: This workflow runs tests, linting, docs build, and package checks
# For documentation deployment to GitHub Pages, see .github/workflows/docs.yml

# Pull openobserve from our ghcr mirror rather than ECR Public. ECR Public
# rate-limits anonymous pulls per source IP and GitHub-hosted runners share
# egress IPs, so E2E deploys intermittently died on
# "toomanyrequests: Rate exceeded". Set at workflow level because the ref is
# identical in every deploying job; jobs that don't deploy ignore it.
#
# The mirror is PRIVATE, so each deploying job also needs the ghcr login step.
# Populate/refresh it with .github/workflows/mirror-openobserve.yml, which must
# be re-run whenever the pin in
# src/osprey/templates/services/openobserve/docker-compose.yml.j2 moves.
env:
  OSPREY_OPENOBSERVE_IMAGE: ghcr.io/als-apg/openobserve:v0.14.4

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      # virtual-accelerator: tests/va/{test_record_factory,test_apply_fault}.py
      # import softioc, which lives in the virtual-accelerator extra (not dev).
      # Without it these unit tests error at collection on a fresh runner.
      #
      # The bluesky stack (bluesky/ophyd-async/tiled) is a core dependency, so
      # plain `uv sync` carries it. tests/services/bluesky_bridge/* guard their
      # imports with `pytest.importorskip` and would SKIP silently if the stack
      # ever left the install set — test_ci_workflow_wiring.py pins the stack in
      # [project] dependencies for that reason.
      run: uv sync --extra dev --extra virtual-accelerator

    - name: Run unit tests
      run: |
        uv run pytest tests/ --ignore=tests/e2e -v --tb=short --cov=src/osprey --cov-report=xml --cov-report=term

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v7
      if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint and Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run ruff (linting)
      run: |
        uv run ruff check src/ tests/ --output-format=github

    - name: Run ruff (formatting)
      run: |
        uv run ruff format --check src/ tests/

    - name: Run mypy (type checking)
      run: |
        uv run mypy src/ --no-error-summary || true
      continue-on-error: true

  docs:
    name: Documentation Build (Check Only)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra docs

    - name: Build documentation
      run: |
        cd docs
        uv run make html

    - name: Check for broken links
      run: |
        cd docs
        uv run make linkcheck || true
      continue-on-error: true

    - name: Upload documentation artifact
      uses: actions/upload-artifact@v7
      if: github.event_name == 'pull_request'
      with:
        name: documentation-preview
        path: docs/build/html
        retention-days: 7

  package:
    name: Package Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Build package
      run: uv build

    - name: Check package
      run: uvx twine check dist/*

    - name: Upload package artifacts
      uses: actions/upload-artifact@v7
      with:
        name: package
        path: dist/
        retention-days: 7

  static-checks:
    name: Tier 0 — Static (preset YAML, skill ↔ MCP-tool consistency)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run Tier 0 static checks
      run: uv run pytest tests/integration/test_preset_static.py -v --tb=short

  visual-theming:
    name: Behavioral + Visual Theming (Playwright, design system)
    runs-on: ubuntu-latest
    # The default GITHUB_TOKEN is read-only repo-wide; this job's last step
    # pushes regenerated Linux baselines back to the PR branch, so it alone
    # needs contents: write (matches docs.yml's workflow-level grant for the
    # same reason — gh-pages push — scoped here to just this job instead of
    # the whole ci.yml workflow).
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    # Job-level "paths" isn't a thing in GitHub Actions — dorny/paths-filter
    # computes it as a step output instead, so every later step can gate on
    # it. An unrelated PR still gets a green (not skipped) job: every gated
    # step no-ops, which reports as job success, same as any other
    # conditionally-skipped step in this workflow.
    - name: Detect design-system / dispatch dashboard changes
      id: changes
      uses: dorny/paths-filter@v4
      with:
        filters: |
          theming:
            - 'src/osprey/interfaces/**'
            - 'src/osprey/dispatch/**'
            - 'tests/interfaces/design_system/**'
            - 'tests/interfaces/web_terminal/**'
            - 'tests/interfaces/conftest.py'
            - 'tests/interfaces/_browser.py'
            - 'tests/interfaces/test_load_smokes.py'

    - name: Install uv
      if: steps.changes.outputs.theming == 'true'
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      if: steps.changes.outputs.theming == 'true'
      run: uv python install 3.11

    - name: Install dependencies
      if: steps.changes.outputs.theming == 'true'
      run: uv sync --extra dev

    - name: Install Playwright chromium
      if: steps.changes.outputs.theming == 'true'
      run: uv run playwright install chromium --with-deps

    - name: Run behavioral theming suite
      if: steps.changes.outputs.theming == 'true'
      run: |
        uv run pytest tests/interfaces/design_system/test_behavioral.py \
          tests/interfaces/web_terminal/test_panels_browser.py \
          tests/interfaces/web_terminal/test_contract_params.py \
          tests/interfaces/web_terminal/test_logout_resume_browser.py \
          tests/interfaces/test_load_smokes.py -v --tb=short

    - name: Run visual regression suite
      # Linux is the authoritative platform for the pixel diff (see
      # test_visual.py's module docstring); this runner IS that platform.
      # A missing baseline is written on the spot — see the "commit" step
      # below for how a first-time/updated baseline lands back in the repo.
      if: steps.changes.outputs.theming == 'true'
      run: uv run pytest tests/interfaces/design_system/test_visual.py -v --tb=short

    - name: Upload Linux-rendered baselines artifact
      if: steps.changes.outputs.theming == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: visual-baselines-linux
        path: tests/interfaces/design_system/baselines/*.png
        retention-days: 14

    - name: Commit new/updated Linux baselines back to the PR branch
      # Only for same-repo PRs — forks can't push, and main pushes have
      # nothing to compare against (baselines only ever change via a PR).
      if: >-
        steps.changes.outputs.theming == 'true' &&
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: "chore(visual): update Linux-rendered theming baseline(s) [skip ci]"
        file_pattern: 'tests/interfaces/design_system/baselines/*.png'
        commit_user_name: "github-actions[bot]"
        commit_user_email: "github-actions[bot]@users.noreply.github.com"

  frontend-js:
    name: Frontend JS (typecheck + lint + vitest)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Install JS dependencies
      # `npm install --no-package-lock`, not `npm ci`: the committed
      # package-lock.json records a resolved entry only for the host platform's
      # rollup binary (the lock is authored on macOS), and both `npm ci` AND a
      # plain `npm install` honor that incomplete tree, so the Linux runner
      # never installs @rollup/rollup-linux-x64-gnu that vitest needs (npm
      # optional-deps bug, npm/cli#4828 — its own error message says to ignore
      # the lockfile). `--no-package-lock` resolves fresh from package.json and
      # installs the correct platform binary. This is a dev/CI-only
      # typecheck+test job, so strict lock reproduction is not required here.
      run: npm install --no-package-lock

    - name: Typecheck (tsc --noEmit)
      run: npm run typecheck

    - name: Lint (eslint)
      run: npm run lint

    - name: Run JS tests (vitest)
      run: npm run test:js

  build-boot-smoke:
    name: Tier 1 — Build + MCP boot (${{ matrix.preset }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [hello-world, control-assistant]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Cache uv project-venv downloads
      uses: actions/cache@v6
      with:
        path: ~/.cache/uv
        key: uv-buildboot-${{ runner.os }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-buildboot-${{ runner.os }}-

    - name: Run Tier 1 boot smoke for preset
      env:
        PRESET: ${{ matrix.preset }}
      run: |
        uv run pytest tests/integration/test_build_boot.py -v --tb=short -k "$PRESET"

  agentic-per-preset:
    name: Tier 3 — Agentic flow (${{ matrix.preset }}) [advisory]
    runs-on: ubuntu-latest
    # Only run on PRs from same repo (ALS_APG_API_KEY unavailable on forks)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        preset: [hello-world, control-assistant]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Log in to ghcr (openobserve mirror)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Pre-flight LLM endpoint reachability check
      env:
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
      run: |
        # Defense in depth: surface "secret unset" or "GitHub Actions IP not
        # allowlisted" failures clearly here, instead of buried under confusing
        # 4xx errors flooding pytest output 5+ minutes later.
        # See CHANGELOG entry on the cborg → ALS-APG CI swap for full context.
        if [ -z "${ALS_APG_API_KEY:-}" ]; then
          echo "❌ ALS_APG_API_KEY secret is not set on this runner"
          echo "   (Check repo secrets; required for the agentic-per-preset job.)"
          exit 1
        fi
        HTTP_CODE=$(curl -sS -o /tmp/probe.txt -w "%{http_code}" --max-time 15 \
          -X POST https://llm.gianlucamartino.com/v1/messages \
          -H "Content-Type: application/json" \
          -H "anthropic-version: 2023-06-01" \
          -H "Authorization: Bearer $ALS_APG_API_KEY" \
          -d '{"model":"claude-haiku-4-5-20251001","max_tokens":4,"messages":[{"role":"user","content":"ping"}]}')
        if [ "$HTTP_CODE" != "200" ]; then
          echo "❌ ALS-APG endpoint probe failed (HTTP $HTTP_CODE)"
          echo "   Body (first 500 chars):"
          head -c 500 /tmp/probe.txt; echo
          echo "   If 401/403: rotate ALS_APG_API_KEY or check IP allowlist."
          echo "   If 5xx: ALS-APG outage — retry, or contact the proxy admin."
          exit 1
        fi
        echo "✅ ALS-APG endpoint reachable (HTTP 200)"

    - name: Run Tier 3 agentic test for preset
      env:
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
        PRESET: ${{ matrix.preset }}
      run: |
        # template names use snake_case in init_project (e.g. hello_world);
        # the matrix entry is the kebab-case preset id, which appears in the
        # function name (test_hello_world_*) so -k matches both.
        PRESET_K="${PRESET//-/_}"
        uv run pytest tests/e2e/test_preset_agentic.py -v --tb=short -k "$PRESET_K"

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Only run on PRs (not pushes) to control API costs, and only for non-fork PRs (secrets unavailable on forks).
    # Also runs on manual workflow_dispatch to enable scoped reruns via the e2e_filter input.
    if: (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Log in to ghcr (openobserve mirror)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Pre-flight LLM endpoint reachability check
      env:
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
      run: |
        # Same probe as agentic-per-preset; see comment there for rationale.
        if [ -z "${ALS_APG_API_KEY:-}" ]; then
          echo "❌ ALS_APG_API_KEY secret is not set on this runner"
          exit 1
        fi
        HTTP_CODE=$(curl -sS -o /tmp/probe.txt -w "%{http_code}" --max-time 15 \
          -X POST https://llm.gianlucamartino.com/v1/messages \
          -H "Content-Type: application/json" \
          -H "anthropic-version: 2023-06-01" \
          -H "Authorization: Bearer $ALS_APG_API_KEY" \
          -d '{"model":"claude-haiku-4-5-20251001","max_tokens":4,"messages":[{"role":"user","content":"ping"}]}')
        if [ "$HTTP_CODE" != "200" ]; then
          echo "❌ ALS-APG endpoint probe failed (HTTP $HTTP_CODE)"
          head -c 500 /tmp/probe.txt; echo
          exit 1
        fi
        echo "✅ ALS-APG endpoint reachable (HTTP 200)"

    - name: Run E2E tests
      # E2E_FILTER comes from workflow_dispatch `inputs.e2e_filter` and is
      # empty on push/PR/schedule triggers, so the full-suite command runs
      # by default. The filter is a debug-only convenience for scoped CI
      # reruns — PR merge gate always exercises the full suite. Workflow
      # inputs require repo write access; treat as trusted (same level as
      # this file).
      env:
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
        E2E_FILTER: ${{ inputs.e2e_filter }}
      run: |
        if [ -n "$E2E_FILTER" ]; then
          echo "Running scoped E2E filter: $E2E_FILTER"
          # Word-splitting on $E2E_FILTER is intentional so callers can
          # pass multiple paths or extra pytest args in one input.
          uv run pytest $E2E_FILTER -v --tb=short
        else
          # Tier 3 per-preset agentic flows live in their own matrix job
          # (agentic-per-preset). The full Docker-stack tests
          # (dispatch-deploy-e2e, bluesky-deploy-e2e, tiled-roundtrip-e2e,
          # va-substrate-equivalence-e2e, bluesky-catalog-e2e,
          # bluesky-sandbox-escape-e2e) and the Dockerfile e2e
          # (dockerfile-e2e) each have their own job because they build
          # container images. Exclude all eight here to avoid
          # double-execution. NOTE: "--ignore" means "not in this
          # secret-gated LLM lane," NOT "not tested" — every ignored file
          # below runs in its own secret-free job on every PR
          # (bluesky-catalog-e2e and bluesky-sandbox-escape-e2e are advisory-only —
          # see those jobs' comments).
          uv run pytest tests/e2e/ -v --tb=short \
            --ignore=tests/e2e/test_preset_agentic.py \
            --ignore=tests/e2e/test_dispatch_deploy.py \
            --ignore=tests/e2e/test_bluesky_deploy.py \
            --ignore=tests/e2e/test_dockerfile_e2e.py \
            --ignore=tests/e2e/test_tiled_roundtrip.py \
            --ignore=tests/e2e/test_va_substrate_equivalence.py \
            --ignore=tests/e2e/test_bluesky_catalog_e2e.py \
            --ignore=tests/e2e/test_bluesky_sandbox_escape_e2e.py \
            --ignore=tests/e2e/test_bluesky_panels_deploy.py
        fi

  deploy-e2e:
    name: Deploy E2E Test (build + deploy pipeline)
    runs-on: ubuntu-latest
    # Only run on PRs from same repo (secrets unavailable on forks)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Log in to ghcr (openobserve mirror)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v2

    - name: Install osprey
      run: uv sync --extra dev

    - name: Create hello_world project
      run: |
        # CI only has ALS_APG_API_KEY (cborg's IP allowlist excludes GitHub
        # Actions runners). Drive provider selection through `osprey build
        # --set` instead of post-build sed surgery — keeps the contract
        # explicit and survives template re-formatting.
        uv run osprey build hello-world-test --preset hello-world \
          --skip-deps --skip-lifecycle \
          --set provider=als-apg --set model=haiku
        cd hello-world-test
        uv run osprey skills install osprey-build-interview
        ls -la

    - name: osprey deploy up (graceful no-op for hello-world)
      env:
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
      run: |
        cd hello-world-test
        # hello-world declares no deployed_services, so deploy up should
        # exit 0 with a "no services configured" notice rather than
        # crashing on TemplateNotFound.
        uv run osprey deploy up -d --dev

    - name: osprey deploy down
      if: always()
      run: |
        cd hello-world-test
        uv run osprey deploy down || true

  dispatch-deploy-e2e:
    name: Dispatch Deploy E2E (full Docker stack + real agent runs)
    runs-on: ubuntu-latest
    # Only run on PRs from same repo (secrets unavailable on forks).
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Log in to ghcr (openobserve mirror)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v2

    - name: Install osprey
      run: uv sync --extra dev

    - name: Pre-flight LLM endpoint reachability check
      env:
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
      run: |
        # Same probe as e2e-tests: fail fast if the proxy is unreachable
        # rather than burning a multi-minute container build first.
        if [ -z "${ALS_APG_API_KEY:-}" ]; then
          echo "❌ ALS_APG_API_KEY secret is not set on this runner"
          exit 1
        fi
        HTTP_CODE=$(curl -sS -o /tmp/probe.txt -w "%{http_code}" --max-time 15 \
          -X POST https://llm.gianlucamartino.com/v1/messages \
          -H "Content-Type: application/json" \
          -H "anthropic-version: 2023-06-01" \
          -H "Authorization: Bearer $ALS_APG_API_KEY" \
          -d '{"model":"claude-haiku-4-5-20251001","max_tokens":4,"messages":[{"role":"user","content":"ping"}]}')
        if [ "$HTTP_CODE" != "200" ]; then
          echo "❌ ALS-APG endpoint probe failed (HTTP $HTTP_CODE)"
          head -c 500 /tmp/probe.txt; echo
          exit 1
        fi
        echo "✅ ALS-APG endpoint reachable (HTTP 200)"

    - name: Run dispatch deploy E2E
      env:
        ALS_APG_API_KEY: ${{ secrets.ALS_APG_API_KEY }}
        EVENT_DISPATCHER_TOKEN: dev-token
        DISPATCH_WORKER_TOKEN: dev-token
      run: |
        uv run pytest tests/e2e/test_dispatch_deploy.py -v --tb=short

  bluesky-deploy-e2e:
    name: Bluesky Deploy E2E (bluesky bridge, full Docker stack)
    runs-on: ubuntu-latest
    # Only run on PRs from same repo (mirrors dispatch-deploy-e2e/deploy-e2e
    # gating). This job needs no secrets — the bluesky bridge never shells out
    # to an LLM — but the same-repo restriction is the house policy for any
    # extra Docker-build-and-deploy job, not just secret-gated ones.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Log in to ghcr (openobserve mirror)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v2

    - name: Install osprey
      run: uv sync --extra dev

    - name: Run bluesky deploy E2E
      run: |
