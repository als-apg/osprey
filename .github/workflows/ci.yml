name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Nightly at 07:00 UTC (midnight Pacific). Tier 4 (provider matrix,
    # benchmarks) gates on github.event_name == 'schedule'.
    - cron: '0 7 * * *'

# Note: This workflow runs tests, linting, docs build, and package checks
# For documentation deployment to GitHub Pages, see .github/workflows/docs.yml

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run unit tests
      run: |
        uv run pytest tests/ --ignore=tests/e2e -v --tb=short --cov=src/osprey --cov-report=xml --cov-report=term

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint and Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run ruff (linting)
      run: |
        uv run ruff check src/ tests/ --output-format=github

    - name: Run ruff (formatting)
      run: |
        uv run ruff format --check src/ tests/

    - name: Run mypy (type checking)
      run: |
        uv run mypy src/ --no-error-summary || true
      continue-on-error: true

  docs:
    name: Documentation Build (Check Only)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra docs

    - name: Build documentation
      run: |
        cd docs
        uv run make html

    - name: Check for broken links
      run: |
        cd docs
        uv run make linkcheck || true
      continue-on-error: true

    - name: Upload documentation artifact
      uses: actions/upload-artifact@v7
      if: github.event_name == 'pull_request'
      with:
        name: documentation-preview
        path: docs/build/html
        retention-days: 7

  package:
    name: Package Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Build package
      run: uv build

    - name: Check package
      run: uvx twine check dist/*

    - name: Upload package artifacts
      uses: actions/upload-artifact@v7
      with:
        name: package
        path: dist/
        retention-days: 7

  static-checks:
    name: Tier 0 — Static (preset YAML, skill ↔ MCP-tool consistency)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run Tier 0 static checks
      run: uv run pytest tests/integration/test_preset_static.py -v --tb=short

  build-boot-smoke:
    name: Tier 1 — Build + MCP boot (${{ matrix.preset }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [hello-world, control-assistant]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Cache uv project-venv downloads
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: uv-buildboot-${{ runner.os }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-buildboot-${{ runner.os }}-

    - name: Run Tier 1 boot smoke for preset
      env:
        PRESET: ${{ matrix.preset }}
      run: |
        uv run pytest tests/integration/test_build_boot.py -v --tb=short -k "$PRESET"

  agentic-per-preset:
    name: Tier 3 — Agentic flow (${{ matrix.preset }}) [advisory]
    runs-on: ubuntu-latest
    # Only run on PRs from same repo (CBORG_API_KEY unavailable on forks)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        preset: [hello-world, control-assistant]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run Tier 3 agentic test for preset
      env:
        CBORG_API_KEY: ${{ secrets.CBORG_API_KEY }}
        PRESET: ${{ matrix.preset }}
      run: |
        # template names use snake_case in init_project (e.g. hello_world);
        # the matrix entry is the kebab-case preset id, which appears in the
        # function name (test_hello_world_*) so -k matches both.
        PRESET_K="${PRESET//-/_}"
        uv run pytest tests/e2e/test_preset_agentic.py -v --tb=short -k "$PRESET_K"

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Only run on PRs (not pushes) to control API costs, and only for non-fork PRs (secrets unavailable on forks)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run E2E tests
      env:
        CBORG_API_KEY: ${{ secrets.CBORG_API_KEY }}
      run: |
        # Tier 3 per-preset agentic flows live in their own matrix job
        # (agentic-per-preset). Exclude here to avoid double-execution.
        uv run pytest tests/e2e/ -v --tb=short \
          --ignore=tests/e2e/test_preset_agentic.py

  deploy-e2e:
    name: Deploy E2E Test (Pipelines Container)
    runs-on: ubuntu-latest
    # Only run on PRs from same repo (secrets unavailable on forks)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v1

    - name: Install osprey
      run: uv sync --extra dev

    - name: Create hello_world project
      run: |
        uv run osprey build hello-world-test --preset hello-world --skip-deps --skip-lifecycle
        cd hello-world-test
        # Switch default provider to cborg (CI only has CBORG_API_KEY).
        sed -i 's|^  provider: anthropic$|  provider: cborg|' config.yml
        sed -i 's|^  default_model: claude-haiku-4-5$|  default_model: anthropic/claude-haiku|' config.yml
        uv run osprey skills install osprey-build-interview
        ls -la

    - name: Deploy pipelines container
      env:
        CBORG_API_KEY: ${{ secrets.CBORG_API_KEY }}
      run: |
        cd hello-world-test
        uv run osprey deploy up -d --dev

    - name: Wait for pipelines to be ready
      run: |
        echo "Waiting for pipelines container to install packages and start..."
        for i in {1..30}; do
          # Check if container is responding
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:9099/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer 0p3n-w3bu!" \
            -d '{"model":"main","messages":[{"role":"user","content":"ping"}],"stream":false}' \
            --max-time 10 || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Pipelines ready after $((i * 10)) seconds"
            exit 0
          fi

          echo "Attempt $i/30: HTTP $HTTP_CODE - waiting 10s..."
          sleep 10
        done

        echo "❌ Pipelines failed to become ready within 5 minutes"
        docker logs pipelines || true
        exit 1

    - name: Test agent query
      run: |
        echo "Sending test query to agent..."
        RESPONSE=$(curl -s -X POST http://localhost:9099/v1/chat/completions \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer 0p3n-w3bu!" \
          -d '{"model":"main","messages":[{"role":"user","content":"What is the weather in San Francisco?"}],"stream":false}' \
          --max-time 300)

        echo "Response:"
        echo "$RESPONSE" | head -c 2000

        # Check for error in response
        if echo "$RESPONSE" | grep -qi '"error"'; then
          echo ""
          echo "❌ Agent returned an error"
          exit 1
        fi

        # Check we got some response content
        if [ -z "$RESPONSE" ] || [ "$RESPONSE" = "{}" ]; then
          echo ""
          echo "❌ Empty response from agent"
          exit 1
        fi

        echo ""
        echo "✅ Agent responded successfully"

    - name: Show container logs on failure
      if: failure()
      run: |
        echo "=== Docker containers ==="
        docker ps -a
        echo ""
        echo "=== Pipelines logs ==="
        docker logs pipelines 2>&1 | tail -200 || true

    - name: Cleanup
      if: always()
      run: |
        cd hello-world-test
        uv run osprey deploy down || true

  all-checks-passed:
    name: All CI Checks Passed
    needs: [test, lint, docs, package, static-checks, build-boot-smoke, e2e-tests, deploy-e2e, agentic-per-preset]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Check all jobs status
      run: |
        if [[ "${{ needs.test.result }}" != "success" ]]; then
          echo "❌ Tests failed"
          exit 1
        fi
        if [[ "${{ needs.lint.result }}" != "success" ]]; then
          echo "❌ Lint checks failed"
          exit 1
        fi
        if [[ "${{ needs.docs.result }}" != "success" ]]; then
          echo "❌ Documentation build failed"
          exit 1
        fi
        if [[ "${{ needs.package.result }}" != "success" ]]; then
          echo "❌ Package build failed"
          exit 1
        fi
        if [[ "${{ needs.static-checks.result }}" != "success" ]]; then
          echo "❌ Tier 0 static checks failed"
          exit 1
        fi
        if [[ "${{ needs.build-boot-smoke.result }}" != "success" ]]; then
          echo "❌ Tier 1 build + boot smoke failed"
          exit 1
        fi
        # Tier 3 agentic-per-preset: advisory (continue-on-error in job)
        if [[ "${{ needs.agentic-per-preset.result }}" == "failure" ]]; then
          echo "⚠️  Agentic per-preset failed (non-blocking, LLM-dependent)"
        elif [[ "${{ needs.agentic-per-preset.result }}" == "skipped" ]]; then
          echo "⏭️  Agentic per-preset skipped (only run on PRs)"
        else
          echo "✅ Agentic per-preset passed"
        fi
        # E2E tests: advisory (LLM-dependent, may fail due to rate limits)
        if [[ "${{ needs.e2e-tests.result }}" == "failure" ]]; then
          echo "⚠️  E2E tests failed (non-blocking, LLM-dependent)"
        elif [[ "${{ needs.e2e-tests.result }}" == "skipped" ]]; then
          echo "⏭️  E2E tests skipped (only run on PRs)"
        else
          echo "✅ E2E tests passed"
        fi
        # Deploy E2E: advisory (LLM-dependent, may fail due to rate limits)
        if [[ "${{ needs.deploy-e2e.result }}" == "failure" ]]; then
          echo "⚠️  Deploy E2E test failed (non-blocking, LLM-dependent)"
        elif [[ "${{ needs.deploy-e2e.result }}" == "skipped" ]]; then
          echo "⏭️  Deploy E2E test skipped (only run on PRs)"
        else
          echo "✅ Deploy E2E test passed"
        fi
        echo "✅ All CI checks passed!"
