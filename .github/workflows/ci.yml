      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Set up rootless Podman
      run: |
        podman --version
        pip install --user podman-compose
        podman compose version
        # Docker auto-treats localhost registries as insecure (plain HTTP);
        # rootless podman defaults to tls-verify=true, so the test's throwaway
        # stub registry on localhost:19081 (HTTP) breaks both `podman push` and
        # the deploy's `podman compose pull`. A registries.conf.d drop-in (merged,
        # not clobbering the default docker.io search registry) marks that one
        # host insecure — giving podman docker's built-in localhost behavior.
        mkdir -p ~/.config/containers/registries.conf.d
        cat > ~/.config/containers/registries.conf.d/localhost-insecure.conf <<'EOF'
        [[registry]]
        location = "localhost:19081"
        insecure = true
        EOF

    - name: Install osprey
      run: uv sync --extra dev

    - name: Run multi-user deploy lifecycle E2E (podman)
      env:
        OSPREY_E2E_RUNTIME: podman
        # Explicit belt-and-suspenders alongside the test's own RUNTIME ->
        # CONTAINER_RUNTIME coupling (see _run_osprey): makes the deploy-side
        # runtime selection self-documenting here too, not just inferred.
        CONTAINER_RUNTIME: podman
      run: |
        # `podman compose` delegates to the docker-compose CLI plugin present on
        # the runner, which speaks the Docker API over the rootless podman socket
        # (unix://$XDG_RUNTIME_DIR/podman/podman.sock). That API service isn't
        # running by default — `podman push`/`build` are direct CLI calls that
        # need no socket, but the compose `pull`/`up` the deploy runs do. Start
        # it for the duration of this step (must be here, not the setup step:
        # each step is its own process group) and wait until it's listening.
        podman system service --time=0 &
        SOCK="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/podman/podman.sock"
        for _ in $(seq 1 30); do if [ -S "$SOCK" ]; then break; fi; sleep 1; done
        export DOCKER_HOST="unix://$SOCK"
        uv run pytest tests/e2e/test_deploy_lifecycle.py -v --tb=short

    # Belt-and-suspenders on top of the test's own try/finally teardown: every
    # resource named here is exact (never a prune/-a/wildcard), matching
    # tests/e2e/test_deploy_lifecycle.py's own container-ops safety guardrail.
    - name: Clean up any stranded lifecycle-e2e resources
      if: always()
      run: |
        for user in alice bob carol dave erin; do
          podman rm -f "e2e-web-${user}" || true
          podman volume rm "osprey-e2e-mus-p3_${user}-claude-config" || true
          podman volume rm "osprey-e2e-mus-p3_${user}-agent-data" || true
        done
        podman rm -f e2e-nginx || true
        podman rm -f osprey-e2e-mus-p3-registry || true
        podman compose -p osprey-e2e-mus-p3 down || true

  all-checks-passed:
    name: All CI Checks Passed
    needs: [test, lint, docs, package, static-checks, visual-theming, frontend-js, build-boot-smoke, e2e-tests, deploy-e2e, dispatch-deploy-e2e, dispatch-overlay-e2e, bluesky-deploy-e2e, bluesky-panels-deploy-e2e, va-substrate-equivalence-e2e, orm-roundtrip-e2e, multi-user-demo-e2e, tiled-roundtrip-e2e, bluesky-catalog-e2e, bluesky-sandbox-escape-e2e, dockerfile-e2e, agentic-per-preset, multi-user-deploy-lifecycle-e2e, multi-user-deploy-lifecycle-e2e-podman]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Check all jobs status
      # Two shapes, both BLOCKING — no advisory tier (house rule: full green,
      # a red e2e lane must never hide inside a green check):
      #
      #   * Always-on jobs (test, lint, ...): anything but "success" fails
      #     the gate, including "skipped".
      #   * Conditionally-run jobs (every e2e/deploy lane; `if:` limits them
      #     to same-repo PRs, and the lifecycle pair to PRs based on main):
      #     "skipped" is a legitimate result on push/schedule/fork-PR/epic
      #     -phase runs and passes the gate; any OTHER non-success result
      #     (failure, cancelled) fails it. Corollary: on fork PRs the secret
      #     -gated lanes don't run at all — the gate can't vouch for them
      #     there, same as before.
      run: |
        if [[ "${{ needs.test.result }}" != "success" ]]; then
          echo "❌ Tests failed"
          exit 1
        fi
        if [[ "${{ needs.lint.result }}" != "success" ]]; then
          echo "❌ Lint checks failed"
          exit 1
        fi
        if [[ "${{ needs.docs.result }}" != "success" ]]; then
          echo "❌ Documentation build failed"
          exit 1
        fi
        if [[ "${{ needs.package.result }}" != "success" ]]; then
          echo "❌ Package build failed"
          exit 1
        fi
        if [[ "${{ needs.static-checks.result }}" != "success" ]]; then
          echo "❌ Tier 0 static checks failed"
          exit 1
        fi
        if [[ "${{ needs.visual-theming.result }}" != "success" ]]; then
          echo "❌ Behavioral/visual theming suite failed"
          exit 1
        fi
        if [[ "${{ needs.frontend-js.result }}" != "success" ]]; then
          echo "❌ Frontend JS (typecheck + vitest) failed"
          exit 1
        fi
        if [[ "${{ needs.build-boot-smoke.result }}" != "success" ]]; then
          echo "❌ Tier 1 build + boot smoke failed"
          exit 1
        fi
        check_pr_lane() {
          # $1 = human-readable lane name, $2 = needs.<job>.result
          if [[ "$2" == "skipped" ]]; then
            echo "⏭️  $1 skipped (lane's if: condition not met on this event)"
          elif [[ "$2" != "success" ]]; then
            echo "❌ $1 failed (result: $2)"
            exit 1
          else
            echo "✅ $1 passed"
          fi
        }
        check_pr_lane "Agentic per-preset"           "${{ needs.agentic-per-preset.result }}"
        check_pr_lane "E2E tests"                    "${{ needs.e2e-tests.result }}"
        check_pr_lane "Deploy E2E"                   "${{ needs.deploy-e2e.result }}"
        check_pr_lane "Dispatch deploy E2E"          "${{ needs.dispatch-deploy-e2e.result }}"
        check_pr_lane "Dispatch overlay E2E"         "${{ needs.dispatch-overlay-e2e.result }}"
        check_pr_lane "Bluesky deploy E2E"           "${{ needs.bluesky-deploy-e2e.result }}"
        check_pr_lane "Bluesky panels deploy E2E"    "${{ needs.bluesky-panels-deploy-e2e.result }}"
        check_pr_lane "VA substrate equivalence E2E" "${{ needs.va-substrate-equivalence-e2e.result }}"
        check_pr_lane "ORM roundtrip E2E"            "${{ needs.orm-roundtrip-e2e.result }}"
        check_pr_lane "Multi-user demo E2E"          "${{ needs.multi-user-demo-e2e.result }}"
        check_pr_lane "Tiled roundtrip E2E"          "${{ needs.tiled-roundtrip-e2e.result }}"
        check_pr_lane "Bluesky catalog E2E"          "${{ needs.bluesky-catalog-e2e.result }}"
        check_pr_lane "Bluesky sandbox escape E2E"   "${{ needs.bluesky-sandbox-escape-e2e.result }}"
        check_pr_lane "Dockerfile E2E"               "${{ needs.dockerfile-e2e.result }}"
        check_pr_lane "Multi-user lifecycle E2E (docker)" "${{ needs.multi-user-deploy-lifecycle-e2e.result }}"
        check_pr_lane "Multi-user lifecycle E2E (podman)" "${{ needs.multi-user-deploy-lifecycle-e2e-podman.result }}"
        echo "✅ All CI checks passed!"
