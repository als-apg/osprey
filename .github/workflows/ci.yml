  bluesky-panels-deploy-e2e:
    name: Bluesky Panels Deploy E2E (VA + bluesky bridge + bluesky-panels sidecar, full Docker stack)
    runs-on: ubuntu-latest
    # Only run on PRs from same repo (mirrors bluesky-deploy-e2e/va-substrate-
    # equivalence-e2e gating). This job needs no secrets — neither the
    # bridge nor the bluesky-panels sidecar shells out to an LLM.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    # Co-deploys the VA (native PyAT/softioc build, same cold-cache cost as
    # va-substrate-equivalence-e2e) alongside the bridge, Tiled, and the
    # bluesky-panels sidecar, then drives a real plan end to end through the
    # sidecar's execute route — comparable weight to va-substrate-
    # equivalence-e2e, not bluesky-deploy-e2e.
    timeout-minutes: 45

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

