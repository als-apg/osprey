
services:

  nginx:
    image: nginx:1.27-alpine
    container_name: dls-nginx
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/landing.html:/usr/share/nginx/html/landing.html:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s



  web-alice:
    image: git.dls.example.org:5050/physics/production/dls-profiles/web-terminal:latest
    container_name: dls-web-alice
    restart: unless-stopped
    network_mode: host
    env_file: .env.production
    environment:
      - CLAUDE_CONFIG_DIR=/data/claude-config
      - HOME=/data/claude-config
      - TZ=America/Los_Angeles
      - OSPREY_TERMINAL_USER=alice
      - OSPREY_TERMINAL_LANDING_URL=http://dls-deploy.dls.example.org:9080
      - OSPREY_TERMINAL_BIND_HOST=127.0.0.1
      - OSPREY_TERMINAL_WEB_PORT=9091
      - OSPREY_WEB_PORT=9091
      - OSPREY_ARTIFACT_SERVER_PORT=9291
      - OSPREY_ARIEL_PORT=9391
      - OSPREY_LATTICE_DASHBOARD_PORT=9491
    volumes:
      - alice-claude-config:/data/claude-config
      - alice-agent-data:/app/dls-assistant/_agent_data
    healthcheck:
      # osprey web's own default listen port is the fixed constant 8087
      # (cli/web_cmd.py) — only relevant to a bare `osprey web` with no
      # OSPREY_WEB_PORT override. Every per-user container here sets
      # OSPREY_WEB_PORT above, so the probe targets the ACTUAL bound port,
      # never the bare 8087 default. Probed via bind_host itself (not a
      # hardcoded "127.0.0.1" literal) since that's the same loopback
      # address OSPREY_TERMINAL_BIND_HOST bakes into the app's own bind.
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9091/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s



  web-bob:
    image: git.dls.example.org:5050/physics/production/dls-profiles/web-terminal:latest
    container_name: dls-web-bob
    restart: unless-stopped
    network_mode: host
    env_file: .env.production
    environment:
      - CLAUDE_CONFIG_DIR=/data/claude-config
      - HOME=/data/claude-config
      - TZ=America/Los_Angeles
      - OSPREY_TERMINAL_USER=bob
      - OSPREY_TERMINAL_LANDING_URL=http://dls-deploy.dls.example.org:9080
      - OSPREY_TERMINAL_BIND_HOST=127.0.0.1
      - OSPREY_TERMINAL_WEB_PORT=9092
      - OSPREY_WEB_PORT=9092
      - OSPREY_ARTIFACT_SERVER_PORT=9292
      - OSPREY_ARIEL_PORT=9392
      - OSPREY_LATTICE_DASHBOARD_PORT=9492
    volumes:
      - bob-claude-config:/data/claude-config
      - bob-agent-data:/app/dls-assistant/_agent_data
    healthcheck:
      # osprey web's own default listen port is the fixed constant 8087
      # (cli/web_cmd.py) — only relevant to a bare `osprey web` with no
      # OSPREY_WEB_PORT override. Every per-user container here sets
      # OSPREY_WEB_PORT above, so the probe targets the ACTUAL bound port,
      # never the bare 8087 default. Probed via bind_host itself (not a
      # hardcoded "127.0.0.1" literal) since that's the same loopback
      # address OSPREY_TERMINAL_BIND_HOST bakes into the app's own bind.
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9092/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s



volumes:

  alice-claude-config:
  alice-agent-data:

  bob-claude-config:
  bob-agent-data:
